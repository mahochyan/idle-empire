<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>文字挂机RTS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  background:#1a1a24;color:#d0d0d8;
  font-family:"PingFang SC","Microsoft YaHei",sans-serif;font-size:14px;
  display:flex;justify-content:center;align-items:center;
  user-select:none;-webkit-user-select:none;
}
#phone{
  width:min(400px,100vw);height:100dvh;max-height:none;
  min-width:0;
  background:#12121c;border:1px solid #2a2a3a;
  display:flex;flex-direction:column;overflow:hidden;position:relative;
}
#topbar{
  background:#0a0a14;padding:6px max(4px,2vw);display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:2px;
  border-bottom:1px solid #222;flex-shrink:0;
}
.top-res{text-align:center}
.top-res .icon{font-size:13px}
.top-res .val{font-size:12px;font-weight:bold;color:#f0d060}
.top-res .cap{font-size:8px;color:#5a5a6e;display:block}
.top-res .label{font-size:9px;color:#666}
#main{flex:1;overflow-y:auto;padding:8px clamp(6px,2.4vw,10px)}
#main::-webkit-scrollbar{width:3px}
#main::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
#navbar{
  background:#0a0a14;border-top:1px solid #222;display:flex;flex-shrink:0;
}
.nav-btn{
  flex:1;min-width:0;text-align:center;padding:8px 2px;cursor:pointer;font-size:10px;
  color:#666;transition:.15s;border:none;background:none;font-family:inherit;
}
.nav-btn .nicon{font-size:18px;display:block;margin-bottom:2px}
.nav-btn.on{color:#f0d060}
.nav-btn.on .nicon{text-shadow:0 0 8px rgba(240,208,96,.4)}

.card{
  background:#181828;border:1px solid #262640;border-radius:8px;
  padding:10px 12px;margin-bottom:8px;
}
.card h3{font-size:14px;color:#e0e0e0;margin-bottom:6px}
.desc{font-size:11px;color:#777;margin:2px 0}

.prog-wrap{background:#0a0a14;border-radius:3px;height:5px;margin:4px 0;overflow:hidden}
.prog-fill{background:#f0d060;height:100%;transition:width .5s}

.btn{
  display:inline-block;padding:7px 16px;border-radius:16px;
  font-size:12px;font-family:inherit;cursor:pointer;border:none;transition:.15s;
}
.btn-go{background:#f0d060;color:#1a1a24;font-weight:bold}
.btn-go:active{background:#c8a830}
.btn-go:disabled{background:#444;color:#888}
.btn:disabled{cursor:not-allowed;opacity:.55}
.btn-ghost{background:transparent;border:1px solid #444;color:#aaa}
.btn-ghost:active{background:#222}
.btn-ghost:disabled{border-color:#30364a;color:#5d6475;background:#11131d}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:12px}
.btn-xs{padding:2px 8px;font-size:10px;border-radius:10px}
.btn-danger{background:#c0392b;color:#fff}
.btn-speed{
  padding:6px 12px;border-radius:4px;font-size:12px;background:#1a1a2e;
  border:1px solid #333;color:#888;cursor:pointer;
}
.btn-speed.on{background:#f0d060;color:#1a1a24;border-color:#f0d060;font-weight:bold}

.unit-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #1e1e2e}
.unit-row:last-child{border-bottom:none}
.unit-row .uicon{font-size:20px;width:30px;text-align:center}
.unit-row .uinfo{flex:1}
.unit-row .uname{font-size:13px;color:#e0e0e0}
.unit-row .udetail{font-size:10px;color:#777}
.unit-row .ucount{font-size:14px;font-weight:bold;color:#f0d060;min-width:24px;text-align:center}

/* 阵型 */
.form-row{margin:4px 0;padding:6px 8px;background:#121224;border-radius:6px;border-left:3px solid #444}
.form-row.r1{border-color:#e06060}
.form-row.r2{border-color:#f0d060}
.form-row.r3{border-color:#6090e0}
.form-row .ftitle{font-size:11px;color:#aaa;margin-bottom:3px}
.form-slot{
  display:inline-block;background:#202038;padding:6px 8px;border-radius:4px;
  font-size:11px;cursor:pointer;margin:2px;min-width:40px;text-align:center;
  border:1px dashed #333;transition:.15s;
}
.form-slot.filled{background:#252545;border:1px solid #3a3a5e}
.form-slot:active{background:#303048}
.form-empty{font-size:10px;color:#444;padding:4px 0}

/* 弹窗 */
.modal-overlay{
  display:none;position:absolute;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.7);z-index:70;justify-content:center;align-items:center;
}
.modal-overlay.active{display:flex}
.modal-box{
  background:#1a1a2e;border:1px solid #3a3a5e;border-radius:12px;
  padding:16px;width:85%;max-height:70%;
}
.modal-box h3{font-size:15px;color:#e0e0e0;margin-bottom:10px;text-align:center}
.modal-unit{
  display:flex;align-items:center;gap:8px;padding:8px;margin:4px 0;
  background:#121224;border-radius:6px;cursor:pointer;border:1px solid transparent;
}
.modal-unit:hover,.modal-unit.sel{border-color:#f0d060}
.modal-unit .mu-icon{font-size:20px}
.modal-unit .mu-info{flex:1}
.modal-unit .mu-name{font-size:13px;color:#e0e0e0}
.modal-unit .mu-detail{font-size:10px;color:#777}
.modal-qty{display:flex;align-items:center;gap:8px;justify-content:center;margin-top:10px}
.modal-qty input{
  width:60px;text-align:center;background:#0a0a14;border:1px solid #333;
  color:#f0d060;padding:6px;border-radius:4px;font-size:16px;font-family:inherit;
}
.modal-qty button{
  width:32px;height:32px;border-radius:50%;border:1px solid #444;
  background:#1a1a2e;color:#e0e0e0;font-size:16px;cursor:pointer;
}

/* 战斗画面 */
#battle-screen{
  display:none;position:absolute;top:0;left:0;width:100%;height:100%;
  background:#0a0a14;z-index:50;flex-direction:column;
}
#battle-screen.active{display:flex}

#battle-top{
  flex-shrink:0;padding:10px 8px 6px;border-bottom:1px solid #1e1e32;
  display:flex;justify-content:space-between;align-items:center;
}
#battle-title{font-size:15px;font-weight:bold;color:#e0e0e0}
#battle-speed{display:flex;gap:4px}

#battle-field{flex:1;display:flex;flex-direction:column;padding:8px;overflow-y:auto;gap:8px}

.enemy-zone,.our-zone{border-radius:8px;padding:8px}
.enemy-zone{border:1px dashed #e06060;background:#0f0f1c}
.our-zone{border:1px dashed #6090e0;background:#0f0f1c}

.zone-label{font-size:11px;color:#888;margin-bottom:6px;text-align:center}

.battle-row{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin:4px 0}
.battle-row .row-label{font-size:10px;color:#555;width:100%;text-align:center;margin-bottom:2px}

/* 兵团框 */
.unit-box{
  width:56px;min-height:56px;background:#181828;border:2px solid #2a2a3e;
  border-radius:8px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  font-size:10px;transition:transform .05s,border-color .1s;
  position:relative;padding:2px;
}
.unit-box .ub-icon{font-size:18px;line-height:1}
.unit-box .ub-name{font-size:9px;color:#aaa}
.unit-box .ub-hp{font-size:10px;color:#f0d060;font-weight:bold;margin-top:1px}
.unit-box.targeted{border-color:#f0d060!important;box-shadow:0 0 8px rgba(240,208,96,.5)}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}50%{transform:translateX(4px)}75%{transform:translateX(-2px)}}
.unit-box.attacking{animation:shake .4s ease;border-color:#e06060!important}
@keyframes hit{0%{transform:scale(1)}50%{transform:scale(1.15);border-color:#f0d060}100%{transform:scale(1);border-color:#e06060}}
.unit-box.hit{animation:hit .4s ease;border-color:#e06060!important}
@keyframes die{0%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}100%{opacity:0;transform:scale(0)}}
.unit-box.dead{animation:die .5s ease forwards;border-color:#ff0000!important}
.unit-box.dead-done{opacity:0;transform:scale(0)}

/* 战斗结果 */
#battle-result{
  display:none;flex-shrink:0;padding:10px 12px;
  background:#1a1a2e;border-top:2px solid #f0d060;border-bottom:2px solid #f0d060;
  align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;
}
#battle-result.win{border-color:#40bf80}
#battle-result.win .result-text{color:#40bf80}
#battle-result.lose{border-color:#e06060}
#battle-result.lose .result-text{color:#e06060}
.result-text{font-size:16px;font-weight:bold}
.result-btns{display:flex;gap:6px}

#battle-msg{
  height:130px;overflow-y:auto;font-size:12px;color:#999;
  padding:6px 8px;border-top:1px solid #1e1e32;flex-shrink:0;
  font-family:monospace;line-height:1.7;
}

.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  background:#2a2a3e;color:#fff;padding:8px 18px;border-radius:16px;
  font-size:12px;z-index:99;pointer-events:none;
  animation:toastIn .3s
}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

.timer-text{font-size:11px;color:#f0d060}
.pulsing{animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.5}}
.paused{opacity:.6;pointer-events:none}

.qty-ctrl{display:inline-flex;align-items:center;gap:2px}
.qty-ctrl button{width:22px;height:22px;border-radius:50%;border:1px solid #444;background:#1a1a2e;color:#e0e0e0;font-size:14px;cursor:pointer;line-height:1}
.qty-ctrl span{min-width:20px;text-align:center;font-size:12px;color:#f0d060}
.train-custom{
  display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-top:4px;
}
.train-custom input{
  width:54px;height:26px;background:#080912;border:2px solid #3a4158;
  color:#f0d060;text-align:center;font-family:inherit;font-size:12px;
}
.modal-quick{
  display:flex;align-items:center;justify-content:center;gap:6px;margin-top:8px;flex-wrap:wrap;
}
.unit-row{flex-wrap:wrap}
.unit-row .uinfo{min-width:118px}
.econ-note{font-size:10px;color:#8d94aa;margin-top:2px;line-height:1.35}
.limit-ok{color:#4fd07a}
.limit-warn{color:#e06060}
.build-meta{font-size:10px;color:#8990a6;margin-top:2px;line-height:1.45}

/* 像素皮肤 */
:root{
  --px-bg:#080912;
  --px-panel:#151724;
  --px-panel-2:#1c2030;
  --px-line:#3a4158;
  --px-line-dark:#05060b;
  --px-gold:#d6a83f;
  --px-gold-soft:#f0d060;
  --px-red:#b34a4a;
  --px-blue:#4f78b7;
  --px-green:#4f9b67;
  --px-muted:#8890a6;
}
*{image-rendering:pixelated}
body{
  background-color:var(--px-bg);
  background-image:
    linear-gradient(45deg,rgba(214,168,63,.05) 25%,transparent 25%),
    linear-gradient(-45deg,rgba(79,120,183,.04) 25%,transparent 25%),
    linear-gradient(#111421 1px,transparent 1px);
  background-size:8px 8px,8px 8px,4px 4px;
}
#phone{
  background:linear-gradient(180deg,#0f111d,#090a12);
  border:3px solid var(--px-line);
  border-radius:0;
  box-shadow:0 0 0 3px var(--px-line-dark),0 12px 0 rgba(0,0,0,.38);
}
#topbar,#navbar,#battle-top{
  background:#090a12;
  border-color:#30364a;
  box-shadow:inset 0 -2px 0 #05060b;
}
#main{background:linear-gradient(180deg,#101220,#0b0d17)}
.pix-icon{
  width:24px;height:24px;display:inline-block;vertical-align:-6px;flex:0 0 auto;
  background-repeat:no-repeat;background-position:center;background-size:100% 100%;
  image-rendering:pixelated;
}
.pix-icon.mini{width:14px;height:14px;vertical-align:-2px}
.pix-icon.sm{width:18px;height:18px;vertical-align:-4px}
.pix-icon.lg{width:32px;height:32px;vertical-align:-9px}
.pix-icon.nav-pix{width:22px;height:22px;display:block;margin:0 auto 2px}
.pix-icon.top-pix{width:22px;height:22px;display:block;margin:0 auto 1px}
.pix-icon.card-pix{margin-right:5px}
.card,.modal-box,.unit-box,.form-slot,.modal-unit,.btn,.btn-speed,.toast{
  border-radius:0!important;
  box-shadow:inset 2px 2px 0 rgba(255,255,255,.06),inset -2px -2px 0 rgba(0,0,0,.45),0 2px 0 #05060b;
}
.card{
  background:linear-gradient(180deg,var(--px-panel-2),var(--px-panel));
  border:2px solid var(--px-line);
  border-left-color:#5a5f77;
  border-top-color:#606783;
  padding:10px 12px;
}
.card h3{
  display:flex;align-items:center;gap:5px;
  color:#e7dfc4;text-shadow:1px 1px 0 #000;
  font-size:13px;letter-spacing:0;
}
.btn,.btn-speed{
  display:inline-flex;align-items:center;justify-content:center;gap:5px;
  min-height:28px;border:2px solid #4b4f62;background:#171a27;color:#d4d8e8;
  text-shadow:1px 1px 0 #000;white-space:nowrap;
}
.btn-go,.btn-speed.on{
  background:#d6a83f;color:#15110a;border-color:#f0d060;
  box-shadow:inset 2px 2px 0 rgba(255,255,255,.28),inset -2px -2px 0 rgba(82,48,8,.45),0 2px 0 #5f3e11;
}
.btn-ghost{background:#111422;border-color:#3b4158;color:#c5cad8}
.btn-danger{background:#8d2e34;border-color:#d45b62;color:#fff}
.top-res .val{color:var(--px-gold-soft);text-shadow:1px 1px 0 #000}
.top-res .label,.nav-btn{font-size:10px;text-shadow:1px 1px 0 #000}
.nav-btn{padding:7px 2px;color:#777f96}
.nav-btn.on{background:#121522;color:var(--px-gold-soft);box-shadow:inset 0 2px 0 #2b3144}
.nav-btn.on .nicon{text-shadow:none}
.unit-row,.modal-unit{border-bottom:2px solid #111421}
.unit-row .uicon{width:34px}
.form-row{
  background:#111421;border:2px solid #2b3144;border-left-width:4px;border-radius:0;
  box-shadow:inset 2px 2px 0 rgba(255,255,255,.04);
}
.form-row.r1{border-color:#2b3144;border-left-color:var(--px-red)}
.form-row.r2{border-color:#2b3144;border-left-color:var(--px-gold)}
.form-row.r3{border-color:#2b3144;border-left-color:var(--px-blue)}
.form-slot{
  background:#171a27;border:2px dashed #3a4158;min-width:58px;
}
.form-slot.filled{background:#202538;border:2px solid #59617b}
.modal-overlay{background:rgba(0,0,0,.78)}
.modal-box{background:#121522;border:3px solid #59617b}
.modal-unit{background:#171a27;border:2px solid #2d3449}
.modal-unit:hover,.modal-unit.sel{border-color:var(--px-gold-soft);background:#242434}
.modal-qty input{
  border-radius:0;background:#080912;border:2px solid #3a4158;color:var(--px-gold-soft);
}
.modal-qty button,.qty-ctrl button{
  border-radius:0!important;border:2px solid #4b4f62;background:#151827;
}
.prog-wrap{border-radius:0;border:1px solid #080912;background:#05060b}
.prog-fill{background:repeating-linear-gradient(90deg,#b47b2a 0 5px,#f0d060 5px 8px)}
#battle-screen{background:#080912}
.enemy-zone,.our-zone{
  border-radius:0;border-width:2px;border-style:solid;background:#0e101b;
  box-shadow:inset 2px 2px 0 rgba(255,255,255,.03),inset -2px -2px 0 rgba(0,0,0,.35);
}
.enemy-zone{border-color:#8f3c46}
.our-zone{border-color:#395f99}
.zone-label{display:flex;align-items:center;justify-content:center;gap:5px;color:#aab1c4}
.unit-box{
  width:62px;min-height:64px;background:#151827;border:3px solid #353b52;
  padding:4px 3px;color:#d9deeb;
}
.unit-box .ub-icon{font-size:0;line-height:1}
.unit-box .ub-name{font-size:9px;color:#bbc1d4;line-height:1.2;margin-top:2px}
.unit-box .ub-hp{
  min-width:30px;margin-top:2px;padding:1px 4px;background:#080912;border:1px solid #31384e;
  font-size:10px;color:var(--px-gold-soft);
}
.unit-box.targeted{border-color:var(--px-gold-soft)!important;box-shadow:0 0 0 2px #6e4b1b,inset 2px 2px 0 rgba(255,255,255,.08)}
@keyframes shake{0%,100%{transform:translate(0,0)}25%{transform:translate(-3px,0)}50%{transform:translate(3px,-1px)}75%{transform:translate(-1px,1px)}}
@keyframes hit{0%{filter:brightness(1)}45%{filter:brightness(2.2);transform:translateY(-2px)}100%{filter:brightness(1);transform:translateY(0)}}
@keyframes die{0%{opacity:1;filter:grayscale(0)}50%{opacity:.6;filter:grayscale(1);transform:translateY(2px)}100%{opacity:0;filter:grayscale(1);transform:scale(.4)}}
#battle-result{background:#121522;border-width:3px}
#battle-msg{background:#080912;border-top:2px solid #242b3f}
#battle-title{flex:1;min-width:0;font-size:13px;line-height:1.35}
#battle-speed{flex-shrink:0}
#battle-top .btn-sm{padding:4px 7px}
@media (max-width:360px){
  body{font-size:13px}
  #topbar{padding:6px 4px}
  .pix-icon.top-pix{width:18px;height:18px}
  .top-res .val{font-size:12px}
  .top-res .label,.nav-btn{font-size:9px}
  .card{padding:8px}
  .btn{padding:6px 9px}
  .btn-xs{padding:2px 6px}
  .unit-row{gap:6px}
  .unit-row .uinfo{min-width:96px}
  .train-custom input{width:46px}
  .form-slot{min-width:48px}
  .unit-box{width:54px;min-height:58px}
}
@media (min-height:920px){
  #phone{max-height:100dvh}
}
</style>
</head>
<body>

<div id="phone">
  <div id="topbar">
    <div class="top-res"><span class="pix-icon i-wood top-pix"></span><div class="val" id="res-wood">0</div><span class="cap" id="cap-wood"></span><div class="label">木材</div></div>
    <div class="top-res"><span class="pix-icon i-stone top-pix"></span><div class="val" id="res-stone">0</div><span class="cap" id="cap-stone"></span><div class="label">石料</div></div>
    <div class="top-res"><span class="pix-icon i-food top-pix"></span><div class="val" id="res-food">0</div><span class="cap" id="cap-food"></span><div class="label">食物</div></div>
    <div class="top-res"><span class="pix-icon i-pop top-pix"></span><div class="val" id="res-pop">0</div><span class="cap" id="cap-pop"></span><div class="label">人口</div></div>
  </div>

  <div id="main"></div>

  <div id="navbar">
    <button class="nav-btn on" data-page="home"><span class="nicon pix-icon i-home nav-pix"></span>主页</button>
    <button class="nav-btn" data-page="build"><span class="nicon pix-icon i-build nav-pix"></span>建筑</button>
    <button class="nav-btn" data-page="barracks"><span class="nicon pix-icon i-army nav-pix"></span>军营</button>
    <button class="nav-btn" data-page="fight"><span class="nicon pix-icon i-battle nav-pix"></span>战斗</button>
    <button class="nav-btn" data-page="log"><span class="nicon pix-icon i-log nav-pix"></span>日志</button>
  </div>

  <!-- 编队弹窗 -->
  <div class="modal-overlay" id="form-modal">
    <div class="modal-box" id="form-modal-content"></div>
  </div>

  <!-- 战斗画面 -->
  <div id="battle-screen">
    <div id="battle-top">
      <div id="battle-title"><span class="pix-icon i-battle sm"></span> 战斗</div>
      <div id="battle-speed">
        <button class="btn-speed on" data-spd="1">1x</button>
        <button class="btn-speed" data-spd="2">2x</button>
        <button class="btn-speed" data-spd="4">4x</button>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="fleeBattle()"><span class="pix-icon i-exit mini"></span>逃跑</button>
    </div>
    <div id="battle-field"></div>
    <div id="battle-result"></div>
    <div id="battle-msg"></div>
  </div>
</div>

<script>
// ==================== 配置 ====================
const CFG = {
  tickMs: 1000,
  campBase: 0,
  maxRows: {front:1, mid:1, back:1},
  battleTimeoutMs: 10*60*1000,
  initRegMax: 100,
  chapterResourceLevels: 10,
  maxUpgradeTime: 120,

  res: {
    wood:{name:'木材',icon:'wood',basePerPop:0.5},
    stone:{name:'石料',icon:'stone',basePerPop:0.5},
    food:{name:'食物',icon:'food',basePerPop:0.5}
  },

  town: [
    {lv:1,name:'小村庄',maxPop:10, needBoss:0},
    {lv:2,name:'村庄',maxPop:18, needBoss:1},

function spriteData(rects){
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">${rects.map(r=>`<rect x="${r[0]}" y="${r[1]}" width="${r[2]}" height="${r[3]}" fill="${r[4]}"/>`).join('')}</svg>`;
  return `url("data:image/svg+xml,${encodeURIComponent(svg)}")`;
}
function injectPixelIcons(){
  const style=document.createElement('style');
  style.textContent=Object.entries(PIX_SPRITES).map(([k,v])=>`.i-${k}{background-image:${spriteData(v)}}`).join('\n');
  document.head.appendChild(style);
}
function pix(key, cls=''){
  return `<span class="pix-icon i-${key} ${cls}" aria-hidden="true"></span>`;
}
function costHtml(cost){
  return `${pix('wood','mini')}${cost.wood} ${pix('stone','mini')}${cost.stone} ${pix('food','mini')}${cost.food}`;
}

let S = {
  res:{wood:30,stone:30,food:30},
  buildings:{},
  pool:{infantry:0,archer:0,cavalry:0,spearman:0,mage:0},
  formation:{front:[],mid:[],back:[]},
  townLv:1,
  popAlloc:{wood:5,stone:3,food:2},
  defeated:[],
  mageOk:false,
  log:[],
  tick:0,
  page:'home',
  selEnemy:null,
  battleSpeed:1,
  battleActive:false
};

// ==================== 辅助 ====================
function bldSt(k){return S.buildings[k]||{lv:0,state:'idle',timer:0,timerEnd:0}}
function bldCfg(k){return CFG.buildings[k]}
function prodRate(rk){
  const alloc=S.popAlloc[rk]||0;
  const base=CFG.res[rk].basePerPop||0.5;
  return alloc*base*(1+buildingBuff(rk));
}
function buildingBuff(rk){
  const bk=Object.keys(CFG.buildings).find(k=>CFG.buildings[k].buffRes===rk);
  if(!bk)return 0;
  const cfg=CFG.buildings[bk],st=bldSt(bk);
  if(st.state==='idle'&&st.lv>0)return cfg.buffBase+st.lv*cfg.buffPerLv;
  return 0;
}
function townCfg(){return CFG.town.find(t=>t.lv===S.townLv)||CFG.town[0]}
function maxPop(){return townCfg().maxPop}
function popAllocTotal(){return Object.values(S.popAlloc).reduce((a,b)=>a+b,0)}
function popFree(){return Math.max(0,maxPop()-popAllocTotal())}
function townUpgradeNeed(){
  const next=CFG.town.find(t=>t.lv===S.townLv+1);
  return next?next.needBoss:999;
}
function townCanUpgrade(){
  return S.townLv<CFG.town.length && bossDefeatedCount()>=townUpgradeNeed();
}
function bossDefeatedCount(){
  return CFG.enemies.filter(e=>e.boss&&S.defeated.includes(e.id)).length;
}
function resourceLevelCap(){
  return bossDefeatedCount() + 1;
}
function resourceCapText(){
  return `\u672c\u7ae0\u4e0a\u9650 Lv.${resourceLevelCap()}`;
}
function storageCapacity(){
  const whLv=(S.buildings.warehouse||{lv:0}).lv;
  return 2000 + whLv * 500;
}
function upgradeLockReason(key){
  const cfg=CFG.buildings[key],st=bldSt(key);
  if((cfg.buffRes||cfg.storagePerLv)&&st.lv>=resourceLevelCap()){
    const nextBoss=CFG.enemies.find(e=>e.boss&&!S.defeated.includes(e.id));
    return nextBoss?`\u5df2\u8fbe${resourceCapText()}\uff0c\u51fb\u8d25${nextBoss.name}\u540e\u7ee7\u7eed\u5347\u7ea7`:`\u5df2\u8fbe${resourceCapText()}`;
  }
  return '';
}
function regMax(){ return 100; }
function trainBuildingKey(uk){
  return Object.keys(CFG.buildings).find(k=>CFG.buildings[k].trains===uk)||null;
}
function trainBuildingState(uk){
  const key=trainBuildingKey(uk);
  return key?bldSt(key):null;
}
function reserveMax(uk){
  const key=trainBuildingKey(uk);
  if(!key)return 0;
  const cfg=CFG.buildings[key],st=bldSt(key);
  return st.lv>0?cfg.reserveBase+st.lv*cfg.reserveBonus:0;
}
function reserveLeft(uk){
  return Math.max(0,reserveMax(uk)-(S.pool[uk]||0));
}
function trainLockReason(uk){
  const key=trainBuildingKey(uk);
  if(!key)return '';
  const cfg=CFG.buildings[key],st=bldSt(key);
  if(cfg.needBoss && bossDefeatedCount() < cfg.needBoss)return '击败'+cfg.needBoss+'个Boss后解锁'+cfg.name;
  if(st.lv<=0&&st.state==='idle')return `需先建造${cfg.name}`;
  if(st.state==='building')return `${cfg.name}建设中`;
  if(st.state==='upgrading')return `${cfg.name}升级中`;
  return '';
}
function mageOk(){return bossDefeatedCount()>=2;}
function trainBuildingLabel(uk){
  const key=trainBuildingKey(uk);
  if(!key)return '';
  const cfg=CFG.buildings[key],st=bldSt(key);
  if(st.lv<=0)return `${cfg.name}: \u672a\u5efa\u9020`;
  return `${cfg.name}: Lv.${st.lv}${st.state==='idle'?'':' / \u6682\u505c\u8bad\u7ec3'}`;
}
function reserveHtml(uk){
  const cap=reserveMax(uk),used=S.pool[uk]||0,left=reserveLeft(uk);
  const cls=cap>0&&used<=cap?'limit-ok':'limit-warn';
  const extra=cap>0?` | \u4f59\u91cf ${left}`:'';
  return `<span class="${cls}">\u540e\u5907 ${used}/${cap}</span>${extra}`;
}
function totalSoldiers(){
  let n=0;for(const v of Object.values(S.pool)) n+=v;
  for(const row of['front','mid','back']) for(const u of S.formation[row]) n+=u.count;
  return n;
}
function formCnt(){return S.formation.front.length+S.formation.mid.length+S.formation.back.length}
function poolAvail(uk){ return S.pool[uk]||0; }
function rowSlots(row){
  const boss=bossDefeatedCount();
  if(row==='front') return 1+(boss>=1?1:0);
  if(row==='mid') return 1+(boss>=2?1:0);
  return 1;
}
function formSlots(){ return rowSlots('front')+rowSlots('mid')+rowSlots('back'); }
function totalUpkeep(){
  let up=0;
  for(const[k,c] of Object.entries(CFG.units)){
    up+=(S.pool[k]||0)*(c.upkeep||0);
    for(const row of['front','mid','back']){
      for(const u of S.formation[row]){ if(u.type===k) up+=u.count*(c.upkeep||0); }
    }
  }
  return up;
}
function cm(atk,def){return CFG.counters[atk][def]||1.0}
function mm(atk,def){
  if(atk==='mage'&&def!=='mage')return CFG.counters.mage[def];
  if(atk!=='mage'&&def==='mage')return CFG.normalVsMage;
  return 1.0;
}
function missRate(attacker,defender){
  const cfg=CFG.miss[attacker.type];
  if(!cfg)return 0;
  return cfg[defender.type]??cfg.base??0;
}
function isAttackMiss(attacker,defender){
  const rate=missRate(attacker,defender);
  return rate>0&&Math.random()<rate;
}

function save(){
  const d={res:S.res,buildings:S.buildings,pool:S.pool,formation:S.formation,townLv:S.townLv,popAlloc:S.popAlloc,defeated:S.defeated,mageOk:S.mageOk,tick:S.tick};
  localStorage.setItem('rts_save',JSON.stringify(d));
}
function load(){
  const r=localStorage.getItem('rts_save');if(!r)return;
  try{const d=JSON.parse(r);S.res=d.res||S.res;S.buildings=d.buildings||{};S.pool=d.pool||S.pool;S.formation=d.formation||S.formation;S.townLv=d.townLv||1;S.popAlloc=d.popAlloc||{wood:5,stone:3,food:2};S.defeated=d.defeated||[];S.mageOk=d.mageOk||false;S.tick=d.tick||0;}catch(e){}
}

// ==================== 计时 ====================
function tick(){
  S.tick++;if(S.battleActive)return;
  let ch=false;
  for(const k of Object.keys(CFG.buildings)){
    const st=bldSt(k);
    if((st.state==='building'||st.state==='upgrading')&&st.timerEnd>0){
      st.timer--;if(st.timer<=0){
        if(st.state==='building'){st.lv=1;addLog(`${CFG.buildings[k].name}建成`)}
        else{st.lv++;addLog(`${CFG.buildings[k].name}→Lv.${st.lv}`)}
        st.state='idle';st.timer=0;st.timerEnd=0;ch=true;
      }
    }
  }
  if(ch)save();
  const cap=storageCapacity();
  for(const rk of Object.keys(CFG.res)){
    if(rk==='food'){
      S.res[rk]=Math.min(S.res[rk]+prodRate(rk)-totalUpkeep(), cap);
      if(S.res[rk]<0)S.res[rk]=0;
    }else{
      S.res[rk]=Math.min(S.res[rk]+prodRate(rk), cap);
    }
  }
  if(S.tick%60===0)save();
  updateUI();
}

// ==================== 操作 ====================
function buildAct(key){
  const cfg=CFG.buildings[key],st=bldSt(key);
  if(cfg.needBoss && bossDefeatedCount()<cfg.needBoss){toast(`\u51fb\u8d25${cfg.needBoss}\u4e2aBoss\u540e\u89e3\u9501`);return}
  if(st.state!=='idle'){toast(st.state==='building'?'建造中':'升级中');return}
  const upLock=st.lv>0?upgradeLockReason(key):'';
  if(upLock){toast(upLock);return}
  const cost=st.lv===0?cfg.build:upCost(key);
  if(S.res.wood<cost.wood||S.res.stone<cost.stone||S.res.food<cost.food){toast('资源不足');return}
  S.res.wood-=cost.wood;S.res.stone-=cost.stone;S.res.food-=cost.food;
  if(!S.buildings[key])S.buildings[key]={lv:0,state:'idle',timer:0,timerEnd:0};
  const bs=S.buildings[key];
  if(bs.lv===0){bs.state='building';bs.timerEnd=cost.time;bs.timer=cost.time;addLog(`开始建造${cfg.name}`)}
  else{bs.state='upgrading';bs.timerEnd=cost.time;bs.timer=cost.time;addLog(`开始升级${cfg.name}`)}
  save();updateUI();
}
function upgradeTown(){
  if(!townCanUpgrade()){toast(`需击败${townUpgradeNeed()}个Boss才能升级城镇`);return}
  if(popAllocTotal()>CFG.town.find(t=>t.lv===S.townLv+1).maxPop){toast('请先减少人口分配');return}
  S.townLv++;
  addLog(`城镇升级为${townCfg().name}，人口上限${maxPop()}`);
  save();updateUI();
}
function setPopAlloc(rk,v){
  const nv=Math.max(0,Math.min(Math.floor(v),999));
  const old=S.popAlloc[rk]||0;
  const diff=nv-old;
  if(diff>0&&popFree()<diff){toast(`空闲人口不足，最多${popAllocTotal()+popFree()}`);return}
  S.popAlloc[rk]=nv;
  save();updateUI();
}
function upCost(key){
  const cfg=CFG.buildings[key],lv=bldSt(key).lv||1;
  const b=cfg.upBase,m=Math.pow(cfg.upCostLv,lv);
  const rawTime=Math.ceil(5*Math.pow(1.45,lv-1)+lv*3);
  const time=Math.min(CFG.maxUpgradeTime,rawTime);
  return{wood:Math.ceil(b.wood*m),stone:Math.ceil(b.stone*m),food:Math.ceil(b.food*m),time};
}
function maxTrainable(uk){
  if(trainLockReason(uk))return 0;
  const c=CFG.units[uk].cost;
  const byRes=Math.floor(Math.min(S.res.wood/c.wood,S.res.stone/c.stone,S.res.food/c.food));
  return Math.max(0,Math.min(byRes,reserveLeft(uk)));
}
function train(uk,qty){
  qty=qty||1;
  qty=Math.max(1,Math.floor(qty));
  const lock=trainLockReason(uk);
  if(lock){toast(lock);return}
  const max=maxTrainable(uk);
  if(max<=0){
    toast(reserveLeft(uk)<=0?'\u540e\u5907\u5175\u529b\u5df2\u6ee1':'璧勬簮涓嶈冻');
    return;
  }
  if(qty>max){
    qty=max;
    toast(`\u5df2\u6309\u4e0a\u9650\u8bad\u7ec3${qty}`);
  }
  
  const c=CFG.units[uk].cost;
  if(S.res.wood<c.wood*qty||S.res.stone<c.stone*qty||S.res.food<c.food*qty){toast('资源不足');return}
  S.res.wood-=c.wood*qty;S.res.stone-=c.stone*qty;S.res.food-=c.food*qty;
  S.pool[uk]=(S.pool[uk]||0)+qty;
  addLog(`训练${CFG.units[uk].name}+${qty}`);save();updateUI();
}
function trainCustom(uk,inputId){
  const el=document.getElementById(inputId);
  const qty=Math.max(1,Math.floor(parseInt(el?.value,10)||1));
  train(uk,qty);
}
function trainMax(uk,inputId){
  const qty=maxTrainable(uk);
  if(qty<=0){
    const lock=trainLockReason(uk);
    toast(lock||(reserveLeft(uk)<=0?'\u540e\u5907\u5175\u529b\u5df2\u6ee1':'璧勬簮涓嶈冻'));
    return;
  }
  if(qty<=0){toast('资源不足');return}
  const el=document.getElementById(inputId);
  if(el)el.value=qty;
  train(uk,qty);
}
function dismiss(uk){
  const a=poolAvail(uk);
  if(a<=0){toast('无可用士兵');return}
  S.pool[uk]-=1;addLog(`解散${CFG.units[uk].name}-1`);save();updateUI();
}

  h+='<div style="max-height:300px;overflow-y:auto">';

  for(const[k,c] of Object.entries(CFG.units)){

    if(av<=0)continue;
    hasAny=true;
    // 检查该排是否已有此兵种兵团
    const target=S.formation[row][idx];
    const remaining=target&&target.type===k?Math.min(rm-target.count, av):Math.min(rm, av);

  }
  if(!hasAny)h+='<div style="text-align:center;color:#666;padding:20px">无可用士兵，请先训练</div>';
  h+='</div>';
  h+=`<div id="modal-qty-area" style="display:none"><div class="modal-qty">
    <button onpointerdown="startModalLongPress(-1)" onpointerup="stopModalLongPress()" onpointerleave="stopModalLongPress()" onpointercancel="stopModalLongPress()" onclick="event.preventDefault()">-</button>
    <input type="text" inputmode="numeric" pattern="[0-9]*" id="modal-qty-input" value="1" onchange="clampQty()" oninput="clampQty()">
    <button onpointerdown="startModalLongPress(1)" onpointerup="stopModalLongPress()" onpointerleave="stopModalLongPress()" onpointercancel="stopModalLongPress()" onclick="event.preventDefault()">+</button>
  </div>
  <div class="modal-quick">
    <button class="btn btn-ghost btn-xs" onclick="setModalQty(S._formModalMax)">MAX</button>
  </div>
  <div style="text-align:center;margin-top:6px;font-size:10px;color:#888">部队人数 (HP)</div>
  <button class="btn btn-go" style="width:100%;margin-top:8px" onclick="confirmForm()">${pix('check','mini')}确认编入</button></div>`;
  content.innerHTML=h;
  document.getElementById('form-modal').classList.add('active');
  S._formModalSel=null;S._formModalQty=1;
}

function selModalUnit(el,type,avail){
  document.querySelectorAll('.modal-unit').forEach(e=>e.classList.remove('sel'));
  el.classList.add('sel');
  S._formModalSel=type;
  S._formModalMax=avail;
  S._formModalQty=Math.min(avail, Math.max(1, Math.floor(avail/2))); // 默认填一半
  const qa=document.getElementById('modal-qty-area');
  qa.style.display='block';
  const inp=document.getElementById('modal-qty-input');
  inp.value=S._formModalQty;
  inp.max=avail;
}

function adjQty(d){
  if(!S._formModalSel)return;
  S._formModalQty=Math.max(1,Math.min(S._formModalMax,S._formModalQty+d));
  document.getElementById('modal-qty-input').value=S._formModalQty;
}
function setModalQty(qty){
  if(!S._formModalSel)return;
  S._formModalQty=Math.max(1,Math.min(S._formModalMax,Math.floor(qty)||1));
  document.getElementById('modal-qty-input').value=S._formModalQty;
}
function clampQty(){
  const v=parseInt(document.getElementById('modal-qty-input').value)||1;
  S._formModalQty=Math.max(1,Math.min(S._formModalMax,v));
  document.getElementById('modal-qty-input').value=S._formModalQty;
}

function confirmForm(){
  if(!S._formModalSel||!formModalTarget)return;
  const type=S._formModalSel,row=formModalTarget.row,idx=formModalTarget.idx;
  const qty=S._formModalQty;
  if(qty<=0||poolAvail(type)<qty){toast('可用人数不足');return}
  const target=S.formation[row][idx];
  if(target&&target.type===type){
    if(target.count+qty>regMax()){toast(`超过兵团上限${regMax()}人`);return}
    target.count+=qty;
  } else {
    if(formCnt()>=formSlots()){toast('阵容已满');return}
    if(qty>regMax()){toast(`超过兵团上限${regMax()}人`);return}
    S.formation[row].push({type,count:qty,id:Date.now()+Math.random()});
  }
  S.pool[type]-=qty; // 从军营扣除
  closeFormModal();
  updateUI();
}

function closeFormModal(){
  document.getElementById('form-modal').classList.remove('active');
  formModalTarget=null;S._formModalSel=null;
}

function adjForm(row,idx,d){
  const u=S.formation[row][idx];
  if(!u)return;
  const nv=u.count+d;
  if(d>0 && nv>regMax()){toast(`兵团上限${regMax()}`);return}
  if(d>0 && poolAvail(u.type)<d){toast('可用人数不足');return}
  if(d>0) S.pool[u.type]-=d;  // 从军营扣除
  if(d<0) S.pool[u.type]+=(-d); // 归还军营
  if(nv<=0){S.formation[row].splice(idx,1);updateUI();return}
  u.count=nv;
  updateUI();
}

// 兵种攻击类型：melee 只能在前排攻击，ranged 任意排都可攻击
function isRanged(unitType){
  return unitType==='archer'||unitType==='mage'||unitType==='spearman';
}

function getTarget(attacker,enemyList){
  const alive=enemyList.filter(u=>u.alive!==false);
  if(!alive.length)return null;
  const rows={front:0,mid:1,back:2};
  const minR=Math.min(...alive.map(u=>rows[u.row]));
  const front=alive.filter(u=>rows[u.row]===minR);

  // 近战不在前排 → 不能攻击
  if(!isRanged(attacker.type) && attacker.row!=='front') return null;

  if(isRanged(attacker.type)){
    // 远程：可越过前排，60%优先打中后排
    const backAlive=alive.filter(u=>rows[u.row]>=1);
    if(backAlive.length>0 && Math.random()<0.6){
      return backAlive[Math.floor(Math.random()*backAlive.length)];
    }
    return alive[Math.floor(Math.random()*alive.length)];
  }
  // 近战(前排)：只能打敌方最前排
  return front[Math.floor(Math.random()*front.length)];
}

// 计算伤害（杀多少兵）
function calcDmg(attacker,defender,isOur){
  const cmv=cm(attacker.type,defender.type);
  const mmv=mm(attacker.type,defender.type);
  let atk=attacker.atk;
  if(isOur){
    atk=Math.floor(atk*(1+(B.tactic.atkPct||0)));
    if(attacker.row==='back') atk=Math.floor(atk*(1+(B.tactic.backPct||0)));
  }
  let def=defender.def;
  if(isOur&&B.tactic.defPct)def=Math.floor(def*(1+B.tactic.defPct));
  // 基础公式：攻击方ATK / 防御方DEF * 克制系数
  const base=atk/Math.max(1,def)*cmv*mmv*(0.8+Math.random()*0.4);
  return Math.max(1,Math.floor(base));
}

function battleTurn(){
  if(!S.battleActive)return;
  B.round++;
  if(B.round>B.maxRound){endBattle('timeout');return}

  const rows={front:0,mid:1,back:2};
  const all=[];
  for(const u of B.ourUnits) if(u.alive!==false) all.push({...u,side:'our'});
  for(const u of B.enemyUnits) if(u.alive!==false) all.push({...u,side:'enemy'});
  for(const a of all){
    if(a.side==='our') a.spd=Math.floor(a.spd*(1+(B.tactic.spdPct||0)));
  }
  all.sort((a,b)=>b.spd-a.spd);

  let idx=0,delay=400/S.battleSpeed;

  function nextAction(){
    if(!S.battleActive)return;
    if(idx>=all.length){
      drawBattleField();
      const oa=B.ourUnits.filter(u=>u.alive!==false).length;
      const ea=B.enemyUnits.filter(u=>u.alive!==false).length;
      if(oa===0){endBattle('lose');return}
      if(ea===0){endBattle('win');return}
      bmsg(`── 回合${B.round}结束 ──`,'#555');
      battleTimer=setTimeout(battleTurn,250/S.battleSpeed);
      return;
    }

    const actor=all[idx];
    if(actor.alive===false){idx++;nextAction();return}

    const enemyList=actor.side==='our'?B.enemyUnits:B.ourUnits;
    const target=getTarget(actor,enemyList);
    if(!target){idx++;nextAction();return} // 近战不在前排跳过攻击

    const actorEl=document.getElementById((actor.side==='our'?'ou-':'eu-')+actor.id);
    const targetEl=document.getElementById((actor.side==='our'?'eu-':'ou-')+target.id);

    if(targetEl)targetEl.classList.add('targeted');
    if(actorEl)actorEl.classList.add('attacking');

    const missed=isAttackMiss(actor,target);
    const dmg=missed?0:calcDmg(actor,target,actor.side==='our');
    const cmv=cm(actor.type,target.type);
    const mmv=mm(actor.type,target.type);
    const actualKill=missed?0:Math.min(dmg,target.hp);

    setTimeout(()=>{
      if(!S.battleActive)return;
      if(actorEl)actorEl.classList.remove('attacking');
      if(targetEl)targetEl.classList.remove('targeted');

      const isGood=cmv>=1.3,isBad=cmv<=0.7;

      if(missed){
        bmsg(`${actor.name} \u2192 ${target.name} MISS${target.type==='cavalry'?' [\u9a91\u5175\u95ea\u907f]':''}`,'#6f7890');
        idx++;
        drawBattleField();
        nextAction();
        return;
      }

      target.hp-=actualKill;

      if(target.hp<=0){
        target.hp=0;target.alive=false;
        if(targetEl){targetEl.classList.add('dead');setTimeout(()=>{if(targetEl)targetEl.classList.add('dead-done')},500);}
        bmsg(`${actor.name} → ${target.name} 击杀${actualKill}人，${target.name}全灭！`+(isGood?'[克制]':'')+(mmv>1?'[易伤]':''),isGood?'#40bf80':'#e06060');
      }else{
        if(targetEl){targetEl.classList.add('hit');setTimeout(()=>{if(targetEl)targetEl.classList.remove('hit')},400);}
        bmsg(`${actor.name} → ${target.name} 击杀${actualKill}人，${target.name}剩余${target.hp}人`+(isBad?'[劣势]':''),'#888');
      }
      idx++;
      drawBattleField();
      nextAction();
    },delay);
  }
  nextAction();
}

// 从存活战斗单位重建阵容，并从军营自动补兵
function rebuildFormation(){
  const newForm={front:[],mid:[],back:[]};
  for(const u of B.ourUnits){
    if(u.alive===false||u.hp<=0)continue;
    for(const row of['front','mid','back']){
      for(const fu of S.formation[row]){
        if(fu.id===u.fid){
          const lost=fu.count-u.hp; // 损失人数
          let refill=Math.min(lost,poolAvail(u.type)); // 从军营补充
          if(refill>0)S.pool[u.type]-=refill;
          newForm[row].push({type:fu.type,count:u.hp+refill,id:fu.id});
          if(refill>0)addLog(`${CFG.units[u.type].name}兵团自动补员+${refill}`);
          break;
        }
      }
    }
  }
  S.formation=newForm;
}

function endBattle(result){
  if(battleTimer)clearTimeout(battleTimer);
  S.battleActive=false;
  rebuildFormation();
  const resEl=document.getElementById('battle-result');
  let text='',cls='';
  if(result==='win'){
    cls='win';text=`${pix('win','sm')} 胜利！`;
    const e=CFG.enemies[S.selEnemy];
    const cap=storageCapacity();
    for(const[r,v] of Object.entries(e.reward)){S.res[r]=(S.res[r]||0)+v;if(S.res[r]>cap)S.res[r]=cap;}
    if(!S.defeated.includes(e.id)){
      S.defeated.push(e.id);
          }
    addLog(`战胜${e.name}`);
  }else if(result==='lose'){
    cls='lose';text=`${pix('lose','sm')} 战败`;
    addLog(`败于${CFG.enemies[S.selEnemy].name}`);
  }else{
    cls='lose';text=`${pix('timer','sm')} 超时`;
  }
  save();
  // 检查下一关是否可用
  const nextIdx=S.selEnemy+1;
  const hasNext=nextIdx<CFG.enemies.length && (S.defeated.includes(CFG.enemies[S.selEnemy].id) || result==='win');
  resEl.className=cls;
  resEl.innerHTML=`
    <span class="result-text">${text}</span>
    <div class="result-btns">
      ${hasNext?`<button class="btn btn-go btn-sm" onclick="nextBattle()">${pix('next','mini')}下一关</button>`:''}
      <button class="btn btn-go btn-sm" onclick="retryBattle()">${pix('reset','mini')}重新对战</button>
      <button class="btn btn-ghost btn-sm" onclick="exitBattle()">${pix('exit','mini')}退出</button>
    </div>`;
  resEl.style.display='flex';
  updateUI();
}

  document.getElementById('res-wood').textContent=wood;

    b.classList.add('on');S.page=b.dataset.page;updateUI();
  });
});

// ==================== init ====================
injectPixelIcons();
load();
if(S.defeated.length<CFG.enemies.length&&S.selEnemy===null)S.selEnemy=S.defeated.length;
if(S.selEnemy===null)S.selEnemy=CFG.enemies.length-1;
updateUI();
setInterval(tick,CFG.tickMs);
addLog('欢迎！');
</script>
