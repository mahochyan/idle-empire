<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>文字挂机RTS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  background:#1a1a24;color:#d0d0d8;
  font-family:"PingFang SC","Microsoft YaHei",sans-serif;font-size:14px;
  display:flex;justify-content:center;align-items:center;
  user-select:none;-webkit-user-select:none;
}
#phone{
  width:min(400px,100vw);height:100dvh;max-height:none;
  min-width:0;
  background:#12121c;border:1px solid #2a2a3a;
  display:flex;flex-direction:column;overflow:hidden;position:relative;
}
#topbar{
  background:#0a0a14;padding:6px max(4px,2vw);display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:2px;
  border-bottom:1px solid #222;flex-shrink:0;
}
.top-res{text-align:center}
.top-res .icon{font-size:13px}
.top-res .val{font-size:12px;font-weight:bold;color:#f0d060}
.top-res .cap{font-size:8px;color:#5a5a6e;display:block}
.top-res .label{font-size:9px;color:#666}
#main{flex:1;overflow-y:auto;padding:8px clamp(6px,2.4vw,10px)}
#main::-webkit-scrollbar{width:3px}
#main::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
#navbar{
  background:#0a0a14;border-top:1px solid #222;display:flex;flex-shrink:0;
}
.nav-btn{
  flex:1;min-width:0;text-align:center;padding:8px 2px;cursor:pointer;font-size:10px;
  color:#666;transition:.15s;border:none;background:none;font-family:inherit;
}
.nav-btn .nicon{font-size:18px;display:block;margin-bottom:2px}
.nav-btn.on{color:#f0d060}
.nav-btn.on .nicon{text-shadow:0 0 8px rgba(240,208,96,.4)}

.card{
  background:#181828;border:1px solid #262640;border-radius:8px;
  padding:10px 12px;margin-bottom:8px;
}
.card h3{font-size:14px;color:#e0e0e0;margin-bottom:6px}
.desc{font-size:11px;color:#777;margin:2px 0}

.prog-wrap{background:#0a0a14;border-radius:3px;height:5px;margin:4px 0;overflow:hidden}
.prog-fill{background:#f0d060;height:100%;transition:width .5s}

.btn{
  display:inline-block;padding:7px 16px;border-radius:16px;
  font-size:12px;font-family:inherit;cursor:pointer;border:none;transition:.15s;
}
.btn-go{background:#f0d060;color:#1a1a24;font-weight:bold}
.btn-go:active{background:#c8a830}
.btn-go:disabled{background:#444;color:#888}
.btn:disabled{cursor:not-allowed;opacity:.55}
.btn-ghost{background:transparent;border:1px solid #444;color:#aaa}
.btn-ghost:active{background:#222}
.btn-ghost:disabled{border-color:#30364a;color:#5d6475;background:#11131d}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:12px}
.btn-xs{padding:2px 8px;font-size:10px;border-radius:10px}
.btn-danger{background:#c0392b;color:#fff}
.btn-speed{
  padding:6px 12px;border-radius:4px;font-size:12px;background:#1a1a2e;
  border:1px solid #333;color:#888;cursor:pointer;
}
.btn-speed.on{background:#f0d060;color:#1a1a24;border-color:#f0d060;font-weight:bold}

.unit-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #1e1e2e}
.unit-row:last-child{border-bottom:none}
.unit-row .uicon{font-size:20px;width:30px;text-align:center}
.unit-row .uinfo{flex:1}
.unit-row .uname{font-size:13px;color:#e0e0e0}
.unit-row .udetail{font-size:10px;color:#777}
.unit-row .ucount{font-size:14px;font-weight:bold;color:#f0d060;min-width:24px;text-align:center}

/* 阵型 */
.form-row{margin:4px 0;padding:6px 8px;background:#121224;border-radius:6px;border-left:3px solid #444}
.form-row.r1{border-color:#e06060}
.form-row.r2{border-color:#f0d060}
.form-row.r3{border-color:#6090e0}
.form-row .ftitle{font-size:11px;color:#aaa;margin-bottom:3px}
.form-slot{
  display:inline-block;background:#202038;padding:6px 8px;border-radius:4px;
  font-size:11px;cursor:pointer;margin:2px;min-width:40px;text-align:center;
  border:1px dashed #333;transition:.15s;
}
.form-slot.filled{background:#252545;border:1px solid #3a3a5e}
.form-slot:active{background:#303048}
.form-empty{font-size:10px;color:#444;padding:4px 0}

/* 弹窗 */
.modal-overlay{
  display:none;position:absolute;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.7);z-index:70;justify-content:center;align-items:center;
}
.modal-overlay.active{display:flex}
.modal-box{
  background:#1a1a2e;border:1px solid #3a3a5e;border-radius:12px;
  padding:16px;width:85%;max-height:70%;
}
.modal-box h3{font-size:15px;color:#e0e0e0;margin-bottom:10px;text-align:center}
.modal-unit{
  display:flex;align-items:center;gap:8px;padding:8px;margin:4px 0;
  background:#121224;border-radius:6px;cursor:pointer;border:1px solid transparent;
}
.modal-unit:hover,.modal-unit.sel{border-color:#f0d060}
.modal-unit .mu-icon{font-size:20px}
.modal-unit .mu-info{flex:1}
.modal-unit .mu-name{font-size:13px;color:#e0e0e0}
.modal-unit .mu-detail{font-size:10px;color:#777}
.modal-qty{display:flex;align-items:center;gap:8px;justify-content:center;margin-top:10px}
.modal-qty input{
  width:60px;text-align:center;background:#0a0a14;border:1px solid #333;
  color:#f0d060;padding:6px;border-radius:4px;font-size:16px;font-family:inherit;
}
.modal-qty button{
  width:32px;height:32px;border-radius:50%;border:1px solid #444;
  background:#1a1a2e;color:#e0e0e0;font-size:16px;cursor:pointer;
}

/* 战斗画面 */
#battle-screen{
  display:none;position:absolute;top:0;left:0;width:100%;height:100%;
  background:#0a0a14;z-index:50;flex-direction:column;
}
#battle-screen.active{display:flex}

#battle-top{
  flex-shrink:0;padding:10px 8px 6px;border-bottom:1px solid #1e1e32;
  display:flex;justify-content:space-between;align-items:center;
}
#battle-title{font-size:15px;font-weight:bold;color:#e0e0e0}
#battle-speed{display:flex;gap:4px}

#battle-field{flex:1;display:flex;flex-direction:column;padding:8px;overflow-y:auto;gap:8px}

.enemy-zone,.our-zone{border-radius:8px;padding:8px}
.enemy-zone{border:1px dashed #e06060;background:#0f0f1c}
.our-zone{border:1px dashed #6090e0;background:#0f0f1c}

.zone-label{font-size:11px;color:#888;margin-bottom:6px;text-align:center}

.battle-row{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin:4px 0}
.battle-row .row-label{font-size:10px;color:#555;width:100%;text-align:center;margin-bottom:2px}

/* 兵团框 */
.unit-box{
  width:56px;min-height:56px;background:#181828;border:2px solid #2a2a3e;
  border-radius:8px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  font-size:10px;transition:transform .05s,border-color .1s;
  position:relative;padding:2px;
}
.unit-box .ub-icon{font-size:18px;line-height:1}
.unit-box .ub-name{font-size:9px;color:#aaa}
.unit-box .ub-hp{font-size:10px;color:#f0d060;font-weight:bold;margin-top:1px}
.unit-box.targeted{border-color:#f0d060!important;box-shadow:0 0 8px rgba(240,208,96,.5)}
@keyframes strike{0%,100%{transform:translateY(0);box-shadow:0 0 8px rgba(255,255,200,.6)}30%{transform:translateY(-6px);box-shadow:0 0 18px rgba(255,255,150,.9)}60%{transform:translateY(3px);box-shadow:0 0 14px rgba(255,255,200,.7)}}
.unit-box.attacking{animation:strike .45s ease;border-color:#f0d060!important}
@keyframes shaken{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px);border-color:#ff4444}40%{transform:translateX(5px)}60%{transform:translateX(-3px);border-color:#ff0000}80%{transform:translateX(3px)}}
.unit-box.hit{animation:shaken .5s ease;border-color:#ff3333!important;box-shadow:0 0 10px rgba(255,0,0,.5)}
@keyframes die{0%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}100%{opacity:0;transform:scale(0)}}
.unit-box.dead{animation:die .5s ease forwards;border-color:#ff0000!important}
.unit-box.dead-done{opacity:0;transform:scale(0)}

/* 战斗结果 */
#battle-result{
  display:none;flex-shrink:0;padding:10px 12px;
  background:#1a1a2e;border-top:2px solid #f0d060;border-bottom:2px solid #f0d060;
  align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;
}
#battle-result.win{border-color:#40bf80}
#battle-result.win .result-text{color:#40bf80}
#battle-result.lose{border-color:#e06060}
#battle-result.lose .result-text{color:#e06060}
.result-text{font-size:16px;font-weight:bold}
.result-btns{display:flex;gap:6px}

#battle-msg{
  height:130px;overflow-y:auto;font-size:12px;color:#999;
  padding:6px 8px;border-top:1px solid #1e1e32;flex-shrink:0;
  font-family:monospace;line-height:1.7;
}

.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  background:#2a2a3e;color:#fff;padding:8px 18px;border-radius:16px;
  font-size:12px;z-index:99;pointer-events:none;
  animation:toastIn .3s
}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

.timer-text{font-size:11px;color:#f0d060}
.pulsing{animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.5}}
.paused{opacity:.6;pointer-events:none}

.qty-ctrl{display:inline-flex;align-items:center;gap:2px}
.qty-ctrl button{width:22px;height:22px;border-radius:50%;border:1px solid #444;background:#1a1a2e;color:#e0e0e0;font-size:14px;cursor:pointer;line-height:1}
.qty-ctrl span{min-width:20px;text-align:center;font-size:12px;color:#f0d060}
.train-custom{
  display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-top:4px;
}
.train-custom input{
  width:54px;height:26px;background:#080912;border:2px solid #3a4158;
  color:#f0d060;text-align:center;font-family:inherit;font-size:12px;
}
.modal-quick{
  display:flex;align-items:center;justify-content:center;gap:6px;margin-top:8px;flex-wrap:wrap;
}
.unit-row{flex-wrap:wrap}
.unit-row .uinfo{min-width:118px}
.econ-note{font-size:10px;color:#8d94aa;margin-top:2px;line-height:1.35}
.limit-ok{color:#4fd07a}
.limit-warn{color:#e06060}
.build-meta{font-size:10px;color:#8990a6;margin-top:2px;line-height:1.45}

.town-map-card{padding:10px}
.town-map-head{
  display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;
}
.town-map-head h3{margin:0}
.town-map-status{
  flex-shrink:0;padding:3px 7px;border:2px solid #4f9b67;background:#132218;
  color:#78d18e;font-size:10px;line-height:1;box-shadow:inset 1px 1px 0 rgba(255,255,255,.08),0 2px 0 #05060b;
}
.town-map{
  position:relative;height:250px;overflow:hidden;border:2px solid #3a4158;background-color:#1b2a22;
  background-image:
    linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px),
    linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),
    radial-gradient(circle at 18% 24%,rgba(78,126,68,.35) 0 13%,transparent 14%),
    radial-gradient(circle at 76% 72%,rgba(99,116,70,.34) 0 11%,transparent 12%),
    linear-gradient(135deg,#1d3426,#16231e 58%,#101922);
  background-size:16px 16px,16px 16px,100% 100%,100% 100%,100% 100%;
  box-shadow:inset 2px 2px 0 rgba(255,255,255,.06),inset -2px -2px 0 rgba(0,0,0,.45),0 2px 0 #05060b;
}
.town-map:before{
  content:"";position:absolute;left:-20px;right:-20px;top:96px;height:34px;
  background:repeating-linear-gradient(90deg,#4b3a24 0 9px,#574327 9px 18px);
  border-top:2px solid rgba(25,18,10,.55);border-bottom:2px solid rgba(25,18,10,.55);
  transform:rotate(-13deg);opacity:.86;
}
.town-road{
  position:absolute;background:repeating-linear-gradient(90deg,#5b4428 0 8px,#6b5131 8px 16px);
  border:2px solid rgba(34,24,13,.5);opacity:.78;z-index:1;
}
.town-road-main{left:46%;top:42px;width:30px;height:176px;transform:rotate(5deg)}
.town-road-branch{left:28%;top:145px;width:170px;height:22px;transform:rotate(-7deg)}
.town-woods,.town-stones,.town-fields{position:absolute;z-index:2;pointer-events:none}
.town-woods{left:5%;top:31%;width:88px;height:72px}
.town-woods i{
  position:absolute;width:17px;height:22px;background:#2f6d3e;border:2px solid #15351f;
  box-shadow:inset 2px 2px 0 rgba(255,255,255,.1),0 2px 0 rgba(0,0,0,.38);
}
.town-woods i:after{
  content:"";position:absolute;left:4px;bottom:-8px;width:5px;height:8px;background:#6b4424;border-left:1px solid #2a170d;
}
.town-woods i:nth-child(1){left:4px;top:9px}
.town-woods i:nth-child(2){left:25px;top:2px}
.town-woods i:nth-child(3){left:47px;top:13px}
.town-woods i:nth-child(4){left:16px;top:38px}
.town-woods i:nth-child(5){left:58px;top:41px}
.town-stones{right:7%;bottom:29%;width:78px;height:55px}
.town-stones i{
  position:absolute;width:20px;height:14px;background:#77808f;border:2px solid #343a48;
  box-shadow:inset 2px 2px 0 rgba(255,255,255,.15),0 2px 0 rgba(0,0,0,.4);
}
.town-stones i:nth-child(1){left:4px;top:16px}
.town-stones i:nth-child(2){left:24px;top:7px}
.town-stones i:nth-child(3){left:43px;top:20px}
.town-stones i:nth-child(4){left:22px;top:32px}
.town-fields{
  right:8%;bottom:7%;width:96px;height:54px;display:grid;grid-template-columns:repeat(3,1fr);gap:4px;
  transform:skewY(-5deg);
}
.town-fields i{
  border:2px solid #61441e;background:repeating-linear-gradient(90deg,#8c7b31 0 5px,#526d2f 5px 10px);
  box-shadow:inset 1px 1px 0 rgba(255,255,255,.08);
}
.town-building{
  position:absolute;z-index:3;min-width:70px;padding:5px 6px;border:2px solid #59617b;background:#171a27;
  color:#e7dfc4;text-align:center;font-size:10px;line-height:1.15;text-shadow:1px 1px 0 #000;
  box-shadow:inset 2px 2px 0 rgba(255,255,255,.08),inset -2px -2px 0 rgba(0,0,0,.48),0 3px 0 #05060b;
}
.town-building:before{
  content:"";display:block;width:28px;height:18px;margin:0 auto 3px;border:2px solid #2b3144;background:#6d3d2a;
  box-shadow:inset 2px 2px 0 rgba(255,255,255,.12),inset -2px -2px 0 rgba(0,0,0,.4);
}
.town-building strong,.town-building em{display:block;font-style:normal;white-space:nowrap}
.town-building strong{font-size:10px;color:#f0d060}
.town-building em{margin-top:2px;color:#c7ccd9;font-size:9px}
.town-building-icon{position:absolute;left:5px;top:4px;color:#f0d060;font-size:10px}
.town-hall{left:50%;top:20px;transform:translateX(-50%);min-width:92px}
.town-hall:before{width:38px;height:25px;background:#8b3b36;border-color:#d6a83f}
.town-lumber{left:7%;top:54%}
.town-lumber:before{background:#5b3322}
.town-quarry{left:11%;bottom:12%}
.town-quarry:before{background:#545b70}
.town-farm{right:8%;bottom:9%}
.town-farm:before{background:#76662d}
.town-tower{right:10%;top:28%;min-width:58px}
.town-tower:before{width:22px;height:30px;background:#5d4a37;border-color:#b78a42}
.town-worker-group{
  position:absolute;z-index:4;pointer-events:none;width:76px;height:42px;
}
.worker-wood-group{left:14%;top:45%}
.worker-stone-group{left:23%;bottom:18%}
.worker-food-group{right:30%;bottom:13%}
.town-worker{
  position:absolute;width:8px;height:10px;background:#d4b06a;border:1px solid #332414;
  box-shadow:0 2px 0 rgba(0,0,0,.35),inset 1px 1px 0 rgba(255,255,255,.16);
}
.town-worker:before{
  content:"";position:absolute;left:2px;top:-5px;width:4px;height:4px;background:#c9965a;border:1px solid #332414;
}
.town-worker:after{
  content:"";position:absolute;left:-3px;top:3px;width:14px;height:2px;background:#5d4530;
  box-shadow:0 5px 0 #2b2118;
}
.worker-wood{background:#b87942}
.worker-stone{background:#a9afb8}
.worker-food{background:#d0bd52}
.worker-wood-1{left:2px;top:8px}
.worker-wood-2{left:22px;top:22px;animation-delay:.35s}
.worker-wood-3{left:45px;top:12px;animation-delay:.7s}
.worker-stone-1{left:3px;top:15px}
.worker-stone-2{left:27px;top:3px;animation-delay:.25s}
.worker-stone-3{left:51px;top:21px;animation-delay:.55s}
.worker-food-1{left:2px;top:20px}
.worker-food-2{left:28px;top:8px;animation-delay:.45s}
.worker-food-3{left:52px;top:24px;animation-delay:.9s}
.worker-walk-a{animation:townWorkerWalkA 2.4s steps(4,end) infinite}
.worker-walk-b{animation:townWorkerWalkB 2.8s steps(4,end) infinite}
.worker-work{animation:townWorkerWork 1.15s steps(2,end) infinite}
@keyframes townWorkerWalkA{
  0%,100%{transform:translateX(0)}
  50%{transform:translateX(10px)}
}
@keyframes townWorkerWalkB{
  0%,100%{transform:translateX(0)}
  50%{transform:translateX(-9px)}
}
@keyframes townWorkerWork{
  0%,100%{transform:translate(0,0)}
  50%{transform:translate(3px,-3px)}
}
.town-troop-summary{
  margin-top:8px;padding:6px 7px;border:2px solid #2b3144;background:#0d101b;color:#c5cad8;
  font-size:10px;line-height:1.45;word-break:break-all;text-shadow:1px 1px 0 #000;
}
@media (prefers-reduced-motion: reduce){
  .town-worker{animation:none!important}
}

/* 像素皮肤 */
:root{
  --px-bg:#080912;
  --px-panel:#151724;
  --px-panel-2:#1c2030;
  --px-line:#3a4158;
  --px-line-dark:#05060b;
  --px-gold:#d6a83f;
  --px-gold-soft:#f0d060;
  --px-red:#b34a4a;
  --px-blue:#4f78b7;
  --px-green:#4f9b67;
  --px-muted:#8890a6;
}
*{image-rendering:pixelated}
body{
  background-color:var(--px-bg);
  background-image:
    linear-gradient(45deg,rgba(214,168,63,.05) 25%,transparent 25%),
    linear-gradient(-45deg,rgba(79,120,183,.04) 25%,transparent 25%),
    linear-gradient(#111421 1px,transparent 1px);
  background-size:8px 8px,8px 8px,4px 4px;
}
#phone{
  background:linear-gradient(180deg,#0f111d,#090a12);
  border:3px solid var(--px-line);
  border-radius:0;
  box-shadow:0 0 0 3px var(--px-line-dark),0 12px 0 rgba(0,0,0,.38);
}
#topbar,#navbar,#battle-top{
  background:#090a12;
  border-color:#30364a;
  box-shadow:inset 0 -2px 0 #05060b;
}
#main{background:linear-gradient(180deg,#101220,#0b0d17)}
.pix-icon{
  width:24px;height:24px;display:inline-block;vertical-align:-6px;flex:0 0 auto;
  background-repeat:no-repeat;background-position:center;background-size:100% 100%;
  image-rendering:pixelated;
}
.pix-icon.mini{width:14px;height:14px;vertical-align:-2px}
.pix-icon.sm{width:18px;height:18px;vertical-align:-4px}
.pix-icon.lg{width:32px;height:32px;vertical-align:-9px}
.pix-icon.nav-pix{width:22px;height:22px;display:block;margin:0 auto 2px}
.pix-icon.top-pix{width:22px;height:22px;display:block;margin:0 auto 1px}
.pix-icon.card-pix{margin-right:5px}
.card,.modal-box,.unit-box,.form-slot,.modal-unit,.btn,.btn-speed,.toast{
  border-radius:0!important;
  box-shadow:inset 2px 2px 0 rgba(255,255,255,.06),inset -2px -2px 0 rgba(0,0,0,.45),0 2px 0 #05060b;
}
.card{
  background:linear-gradient(180deg,var(--px-panel-2),var(--px-panel));
  border:2px solid var(--px-line);
  border-left-color:#5a5f77;
  border-top-color:#606783;
  padding:10px 12px;
}
.card h3{
  display:flex;align-items:center;gap:5px;
  color:#e7dfc4;text-shadow:1px 1px 0 #000;
  font-size:13px;letter-spacing:0;
}
.btn,.btn-speed{
  display:inline-flex;align-items:center;justify-content:center;gap:5px;
  min-height:28px;border:2px solid #4b4f62;background:#171a27;color:#d4d8e8;
  text-shadow:1px 1px 0 #000;white-space:nowrap;
}
.btn-go,.btn-speed.on{
  background:#d6a83f;color:#15110a;border-color:#f0d060;
  box-shadow:inset 2px 2px 0 rgba(255,255,255,.28),inset -2px -2px 0 rgba(82,48,8,.45),0 2px 0 #5f3e11;
  text-shadow:none;
}
.btn-ghost{background:#111422;border-color:#3b4158;color:#c5cad8}
.btn-danger{background:#8d2e34;border-color:#d45b62;color:#fff}
.top-res .val{color:var(--px-gold-soft);text-shadow:1px 1px 0 #000}
.top-res .label,.nav-btn{font-size:10px;text-shadow:1px 1px 0 #000}
.nav-btn{padding:7px 2px;color:#777f96}
.nav-btn.on{background:#121522;color:var(--px-gold-soft);box-shadow:inset 0 2px 0 #2b3144}
.nav-btn.on .nicon{text-shadow:none}
.unit-row,.modal-unit{border-bottom:2px solid #111421}
.unit-row .uicon{width:34px}
.form-row{
  background:#111421;border:2px solid #2b3144;border-left-width:4px;border-radius:0;
  box-shadow:inset 2px 2px 0 rgba(255,255,255,.04);
}
.form-row.r1{border-color:#2b3144;border-left-color:var(--px-red)}
.form-row.r2{border-color:#2b3144;border-left-color:var(--px-gold)}
.form-row.r3{border-color:#2b3144;border-left-color:var(--px-blue)}
.form-slot{
  background:#171a27;border:2px dashed #3a4158;min-width:58px;
}
.form-slot.filled{background:#202538;border:2px solid #59617b}
.modal-overlay{background:rgba(0,0,0,.78)}
.modal-box{background:#121522;border:3px solid #59617b}
.modal-unit{background:#171a27;border:2px solid #2d3449}
.modal-unit:hover,.modal-unit.sel{border-color:var(--px-gold-soft);background:#242434}
.modal-qty input{
  border-radius:0;background:#080912;border:2px solid #3a4158;color:var(--px-gold-soft);
}
.modal-qty button,.qty-ctrl button{
  border-radius:0!important;border:2px solid #4b4f62;background:#151827;
}
.prog-wrap{border-radius:0;border:1px solid #080912;background:#05060b}
.prog-fill{background:repeating-linear-gradient(90deg,#b47b2a 0 5px,#f0d060 5px 8px)}
#battle-screen{background:#080912}
.enemy-zone,.our-zone{
  border-radius:0;border-width:2px;border-style:solid;background:#0e101b;
  box-shadow:inset 2px 2px 0 rgba(255,255,255,.03),inset -2px -2px 0 rgba(0,0,0,.35);
}
.enemy-zone{border-color:#8f3c46}
.our-zone{border-color:#395f99}
.zone-label{display:flex;align-items:center;justify-content:center;gap:5px;color:#aab1c4}
.unit-box{
  width:62px;min-height:64px;background:#151827;border:3px solid #353b52;
  padding:4px 3px;color:#d9deeb;
}
.unit-box .ub-icon{font-size:0;line-height:1}
.unit-box .ub-name{font-size:9px;color:#bbc1d4;line-height:1.2;margin-top:2px}
.unit-box .ub-hp{
  min-width:30px;margin-top:2px;padding:1px 4px;background:#080912;border:1px solid #31384e;
  font-size:10px;color:var(--px-gold-soft);
}
.unit-box.targeted{border-color:var(--px-gold-soft)!important;box-shadow:0 0 0 2px #6e4b1b,inset 2px 2px 0 rgba(255,255,255,.08)}
@keyframes strike{0%,100%{transform:translateY(0);box-shadow:0 0 8px rgba(255,255,200,.6)}30%{transform:translateY(-6px);box-shadow:0 0 18px rgba(255,255,150,.9)}60%{transform:translateY(3px);box-shadow:0 0 14px rgba(255,255,200,.7)}}
@keyframes shaken{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px);border-color:#ff4444}40%{transform:translateX(5px)}60%{transform:translateX(-3px);border-color:#ff0000}80%{transform:translateX(3px)}}
@keyframes die{0%{opacity:1;filter:grayscale(0)}50%{opacity:.6;filter:grayscale(1);transform:translateY(2px)}100%{opacity:0;filter:grayscale(1);transform:scale(.4)}}
#battle-result{background:#121522;border-width:3px}
#battle-msg{background:#080912;border-top:2px solid #242b3f}
#battle-title{flex:1;min-width:0;font-size:13px;line-height:1.35}
#battle-speed{flex-shrink:0}
#battle-top .btn-sm{padding:4px 7px}
@media (max-width:360px){
  body{font-size:13px}
  #topbar{padding:6px 4px}
  .pix-icon.top-pix{width:18px;height:18px}
  .top-res .val{font-size:12px}
  .top-res .label,.nav-btn{font-size:9px}
  .card{padding:8px}
  .btn{padding:6px 9px}
  .btn-xs{padding:2px 6px}
  .unit-row{gap:6px}
  .unit-row .uinfo{min-width:96px}
  .train-custom input{width:46px}
  .form-slot{min-width:48px}
  .unit-box{width:54px;min-height:58px}
}
@media (min-height:920px){
  #phone{max-height:100dvh}
}
</style>
</head>
<body>

<div id="phone">
  <div id="topbar">
    <div class="top-res"><span class="pix-icon i-wood top-pix"></span><div class="val" id="res-wood">0</div><span class="cap" id="cap-wood"></span><div class="label">木材</div></div>
    <div class="top-res"><span class="pix-icon i-stone top-pix"></span><div class="val" id="res-stone">0</div><span class="cap" id="cap-stone"></span><div class="label">石料</div></div>
    <div class="top-res"><span class="pix-icon i-food top-pix"></span><div class="val" id="res-food">0</div><span class="cap" id="cap-food"></span><div class="label">食物</div></div>
    <div class="top-res"><span class="pix-icon i-pop top-pix"></span><div class="val" id="res-pop">0</div><span class="cap" id="cap-pop"></span><div class="label">人口</div></div>
  </div>

  <div id="main"></div>

  <div id="navbar">
    <button class="nav-btn on" data-page="home"><span class="nicon pix-icon i-home nav-pix"></span>主页</button>
    <button class="nav-btn" data-page="build"><span class="nicon pix-icon i-build nav-pix"></span>建筑</button>
    <button class="nav-btn" data-page="barracks"><span class="nicon pix-icon i-army nav-pix"></span>军营</button>
    <button class="nav-btn" data-page="fight"><span class="nicon pix-icon i-battle nav-pix"></span>战斗</button>
    <button class="nav-btn" data-page="log"><span class="nicon pix-icon i-log nav-pix"></span>日志</button>
  </div>

  <!-- 编队弹窗 -->
  <div class="modal-overlay" id="form-modal">
    <div class="modal-box" id="form-modal-content"></div>
  </div>

  <!-- 单位详情弹窗 -->
  <div class="modal-overlay" id="unit-detail-modal">
    <div class="modal-box" id="unit-detail-content"></div>
  </div>

  <!-- 战斗画面 -->
  <div id="battle-screen">
    <div id="battle-top">
      <div id="battle-title"><span class="pix-icon i-battle sm"></span> 战斗</div>
      <div id="battle-speed">
        <button class="btn-speed on" data-spd="1">1x</button>
        <button class="btn-speed" data-spd="2">2x</button>
        <button class="btn-speed" data-spd="4">4x</button>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="fleeBattle()"><span class="pix-icon i-exit mini"></span>逃跑</button>
    </div>
    <div id="battle-field"></div>
    <div id="battle-result"></div>
    <div id="battle-msg"></div>
  </div>
</div>

<script src="sprites.js"></script>
<script src="math.js"></script>
<script src="ui.js"></script>
</body>
</html>
