<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>文字挂机RTS</title>
<!-- ==================== CSS 样式表 ==================== -->
<!-- 像素风暗色主题，手机框体布局(400px宽)，响应式适配 -->
<style>
/* ===== 全局重置 ===== */
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  background:#1a1a24;color:#d0d0d8;
  font-family:"PingFang SC","Microsoft YaHei",sans-serif;font-size:14px;
  display:flex;justify-content:center;align-items:center;
  user-select:none;-webkit-user-select:none;
}
/* ===== 手机框体 ===== */
#phone{
  width:min(400px,100vw);height:100dvh;max-height:none;
  min-width:0;
  background:#12121c;border:1px solid #2a2a3a;
  display:flex;flex-direction:column;overflow:hidden;position:relative;
}
/* ===== 顶部资源栏 ===== */
#topbar{
  background:#0a0a14;padding:6px max(4px,2vw);display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:2px;
  border-bottom:1px solid #222;flex-shrink:0;
}
.top-res{text-align:center}
.top-res .icon{font-size:13px}
.top-res .val{font-size:12px;font-weight:bold;color:#f0d060}
.top-res .cap{font-size:8px;color:#5a5a6e;display:block}
.top-res .label{font-size:9px;color:#666}
/* ===== 主内容区 + 城镇场景 + 底部导航 ===== */
#main{flex:1;overflow-y:auto;padding:8px clamp(6px,2.4vw,10px)}
#main::-webkit-scrollbar{width:3px}
#main::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
#town-scene{flex-shrink:0;display:none;padding:0 clamp(6px,2.4vw,10px)}
#navbar{
  background:#0a0a14;border-top:1px solid #222;display:flex;flex-shrink:0;
}
.nav-btn{
  flex:1;min-width:0;text-align:center;padding:8px 2px;cursor:pointer;font-size:10px;
  color:#666;transition:.15s;border:none;background:none;font-family:inherit;
}
.nav-btn .nicon{font-size:18px;display:block;margin-bottom:2px}
.nav-btn.on{color:#f0d060}
.nav-btn.on .nicon{text-shadow:0 0 8px rgba(240,208,96,.4)}

/* ===== 卡片 / 进度条 / 按钮 ===== */
.card{
  background:#181828;border:1px solid #262640;border-radius:8px;
  padding:10px 12px;margin-bottom:8px;
}
.card h3{font-size:14px;color:#e0e0e0;margin-bottom:6px}
.desc{font-size:11px;color:#777;margin:2px 0}

.prog-wrap{background:#0a0a14;border-radius:3px;height:5px;margin:4px 0;overflow:hidden}
.prog-fill{background:#f0d060;height:100%;transition:width .5s}

.btn{
  display:inline-block;padding:7px 16px;border-radius:16px;
  font-size:12px;font-family:inherit;cursor:pointer;border:none;transition:.15s;
}
.btn-go{background:#f0d060;color:#1a1a24;font-weight:bold}
.btn-go:active{background:#c8a830}
.btn-go:disabled{background:#444;color:#888}
.btn:disabled{cursor:not-allowed;opacity:.55}
.btn-ghost{background:transparent;border:1px solid #444;color:#aaa}
.btn-ghost:active{background:#222}
.btn-ghost:disabled{border-color:#30364a;color:#5d6475;background:#11131d}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:12px}
.btn-xs{padding:2px 8px;font-size:10px;border-radius:10px}
.btn-danger{background:#c0392b;color:#fff}
.btn-speed{
  padding:6px 12px;border-radius:4px;font-size:12px;background:#1a1a2e;
  border:1px solid #333;color:#888;cursor:pointer;
}
.btn-speed.on{background:#f0d060;color:#1a1a24;border-color:#f0d060;font-weight:bold}

/* ===== 兵种行 ===== */
.unit-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #1e1e2e}
.unit-row:last-child{border-bottom:none}
.unit-row .uicon{font-size:20px;width:30px;text-align:center}
.unit-row .uinfo{flex:1}
.unit-row .uname{font-size:13px;color:#e0e0e0}
.unit-row .udetail{font-size:10px;color:#777}
.unit-row .ucount{font-size:14px;font-weight:bold;color:#f0d060;min-width:24px;text-align:center}

/* ===== 阵型行（前/中/后排）===== */
.form-row{margin:4px 0;padding:6px 8px;background:#121224;border-radius:6px;border-left:3px solid #444}
.form-row.r1{border-color:#e06060}
.form-row.r2{border-color:#f0d060}
.form-row.r3{border-color:#6090e0}
.form-row .ftitle{font-size:11px;color:#aaa;margin-bottom:3px}
.form-slot{
  display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  background:#202038;padding:7px 8px;border-radius:4px;
  font-size:11px;cursor:pointer;margin:2px;min-width:72px;min-height:90px;text-align:center;
  border:1px dashed #333;transition:.15s;
}
.form-slot .pix-icon.sm{width:46px;height:46px;display:block;margin:0 auto 2px;vertical-align:0}
.form-slot.filled{background:#252545;border:1px solid #3a3a5e}
.form-slot:active{background:#303048}
.form-empty{font-size:10px;color:#444;padding:4px 0}

/* ===== 弹窗系统 ===== */
.modal-overlay{
  display:none;position:absolute;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.7);z-index:70;justify-content:center;align-items:center;
}
.modal-overlay.active{display:flex}
.modal-box{
  background:#1a1a2e;border:1px solid #3a3a5e;border-radius:12px;
  padding:16px;width:85%;max-height:70%;
}
.modal-box h3{font-size:15px;color:#e0e0e0;margin-bottom:10px;text-align:center}
.modal-unit{
  display:flex;align-items:center;gap:12px;padding:10px;margin:5px 0;
  background:#121224;border-radius:6px;cursor:pointer;border:1px solid transparent;
}
.modal-unit:hover,.modal-unit.sel{border-color:#f0d060}
.modal-unit .mu-icon{width:62px;height:62px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.modal-unit .mu-icon .pix-icon.lg{width:58px;height:58px;vertical-align:0}
.modal-unit .mu-info{flex:1}
.modal-unit .mu-name{font-size:13px;color:#e0e0e0}
.modal-unit .mu-detail{font-size:10px;color:#777}
.modal-qty{display:flex;align-items:center;gap:8px;justify-content:center;margin-top:10px}
.modal-qty input{
  width:60px;text-align:center;background:#0a0a14;border:1px solid #333;
  color:#f0d060;padding:6px;border-radius:4px;font-size:16px;font-family:inherit;
}
.modal-qty button{
  width:32px;height:32px;border-radius:50%;border:1px solid #444;
  background:#1a1a2e;color:#e0e0e0;font-size:16px;cursor:pointer;
}

/* ===== 战斗画面 ===== */
#battle-screen{
  display:none;position:absolute;top:0;left:0;width:100%;height:100%;
  background:#0a0a14;z-index:50;flex-direction:column;
}
#battle-screen.active{display:flex}

#battle-top{
  flex-shrink:0;padding:10px 8px 6px;border-bottom:1px solid #1e1e32;
  display:flex;justify-content:space-between;align-items:center;
}
#battle-title{font-size:15px;font-weight:bold;color:#e0e0e0}
#battle-speed{display:flex;gap:4px}

#battle-field{flex:1;display:flex;flex-direction:column;padding:8px;overflow-y:auto;gap:8px}

.enemy-zone,.our-zone{border-radius:8px;padding:8px}
.enemy-zone{border:1px dashed #e06060;background:#0f0f1c}
.our-zone{border:1px dashed #6090e0;background:#0f0f1c}

.zone-label{font-size:11px;color:#888;margin-bottom:6px;text-align:center}

.battle-row{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin:4px 0}
.battle-row .row-label{font-size:10px;color:#555;width:100%;text-align:center;margin-bottom:2px}

/* ===== 战斗兵团框 + 动画 ===== */
.unit-box{
  width:56px;min-height:56px;background:#181828;border:2px solid #2a2a3e;
  border-radius:8px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  font-size:10px;transition:transform .05s,border-color .1s;
  position:relative;padding:2px;
}
.unit-box .ub-icon{font-size:18px;line-height:1}
.unit-box .ub-name{font-size:9px;color:#aaa}
.unit-box .ub-hp{font-size:10px;color:#f0d060;font-weight:bold;margin-top:1px}
.unit-box.targeted{border-color:#f0d060!important;box-shadow:0 0 8px rgba(240,208,96,.5)}
@keyframes strike{0%,100%{transform:translateY(0);box-shadow:0 0 8px rgba(255,255,200,.6)}30%{transform:translateY(-6px);box-shadow:0 0 18px rgba(255,255,150,.9)}60%{transform:translateY(3px);box-shadow:0 0 14px rgba(255,255,200,.7)}}
.unit-box.attacking{animation:strike .68s ease;border-color:#f0d060!important}
@keyframes shaken{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px);border-color:#ff4444}40%{transform:translateX(5px)}60%{transform:translateX(-3px);border-color:#ff0000}80%{transform:translateX(3px)}}
.unit-box.hit{animation:shaken .75s ease;border-color:#ff3333!important;box-shadow:0 0 10px rgba(255,0,0,.5)}
@keyframes die{0%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}100%{opacity:0;transform:scale(0)}}
.unit-box.dead{animation:die .75s ease forwards;border-color:#ff0000!important}
.unit-box.dead-done{opacity:0;transform:scale(0)}

/* ===== 战斗结果面板 ===== */
#battle-result{
  display:none;flex-shrink:0;padding:10px 12px;
  background:#1a1a2e;border-top:2px solid #f0d060;border-bottom:2px solid #f0d060;
  align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;
}
#battle-result.win{border-color:#40bf80}
#battle-result.win .result-text{color:#40bf80}
#battle-result.lose{border-color:#e06060}
#battle-result.lose .result-text{color:#e06060}
.result-text{font-size:16px;font-weight:bold}
.result-btns{display:flex;gap:6px}

#battle-msg{
  height:130px;overflow-y:auto;font-size:12px;color:#999;
  padding:6px 8px;border-top:1px solid #1e1e32;flex-shrink:0;
  font-family:monospace;line-height:1.7;
}

.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  background:#2a2a3e;color:#fff;padding:8px 18px;border-radius:16px;
  font-size:12px;z-index:99;pointer-events:none;
  animation:toastIn .3s
}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

.timer-text{font-size:11px;color:#f0d060}
.pulsing{animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.5}}
.paused{opacity:.6;pointer-events:none}

.qty-ctrl{display:inline-flex;align-items:center;gap:2px}
.qty-ctrl button{width:22px;height:22px;border-radius:50%;border:1px solid #444;background:#1a1a2e;color:#e0e0e0;font-size:14px;cursor:pointer;line-height:1}
.qty-ctrl span{min-width:20px;text-align:center;font-size:12px;color:#f0d060}
.train-custom{
  display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-top:4px;
}
.train-custom input{
  width:54px;height:26px;background:#080912;border:2px solid #3a4158;
  color:#f0d060;text-align:center;font-family:inherit;font-size:12px;
}
.modal-quick{
  display:flex;align-items:center;justify-content:center;gap:6px;margin-top:8px;flex-wrap:wrap;
}
.unit-row{flex-wrap:wrap}
.unit-row .uinfo{min-width:118px}
.econ-note{font-size:10px;color:#8d94aa;margin-top:2px;line-height:1.35}
.limit-ok{color:#4fd07a}
.limit-warn{color:#e06060}
.build-meta{font-size:10px;color:#8990a6;margin-top:2px;line-height:1.45}

/* ===== 城镇巡防地图 ===== */
.town-map-card{padding:10px}
.town-map-head{
  display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;
}
.town-map-head h3{margin:0}
.town-map-status{
  flex-shrink:0;padding:3px 7px;border:2px solid #4f9b67;background:#132218;
  color:#78d18e;font-size:10px;line-height:1;box-shadow:inset 1px 1px 0 rgba(255,255,255,.08),0 2px 0 #05060b;
}
.town-map{
  position:relative;aspect-ratio:1555/1011;height:auto;min-height:220px;overflow:hidden;
  border:2px solid #4b5168;background:#172418 url('./assets/town-terrain.png') center/100% 100% no-repeat;
  box-shadow:inset 0 0 0 3px #090d13,inset 2px 2px 0 rgba(255,255,255,.07),inset -2px -2px 0 rgba(0,0,0,.55),0 2px 0 #05060b;
}
.town-map-zone{position:absolute;left:0;right:0;z-index:0;pointer-events:none;display:none}
.town-resource-zone{
  top:0;height:128px;background:
    radial-gradient(circle at 22% 45%,rgba(74,128,70,.38),transparent 30%),
    radial-gradient(circle at 72% 34%,rgba(78,118,72,.24),transparent 31%),
    linear-gradient(180deg,rgba(42,75,48,.36),rgba(30,54,38,.08));
}
.town-defense-zone{
  top:128px;height:70px;background:
    repeating-linear-gradient(90deg,rgba(105,72,38,.16) 0 10px,transparent 10px 18px),
    linear-gradient(180deg,rgba(91,66,37,.24),rgba(35,39,35,.18));
  border-top:2px solid rgba(73,56,35,.56);border-bottom:2px solid rgba(10,12,18,.7);
}
.town-frontier-zone{
  bottom:0;height:62px;background:
    radial-gradient(circle at 58% 42%,rgba(89,54,42,.3),transparent 33%),
    repeating-linear-gradient(135deg,rgba(42,33,30,.38) 0 6px,transparent 6px 14px),
    linear-gradient(180deg,rgba(19,24,24,.2),rgba(9,11,17,.74));
}
.town-map:before{
  content:"";position:absolute;inset:0;z-index:0;pointer-events:none;
  background:
    linear-gradient(180deg,rgba(255,255,255,.02),rgba(0,0,0,.12)),
    radial-gradient(circle at 50% 48%,transparent 0 58%,rgba(0,0,0,.2) 100%);
}
.town-map:after{
  content:"";position:absolute;inset:7px;z-index:0;pointer-events:none;border:2px solid rgba(100,108,126,.35);
  box-shadow:inset 0 0 0 2px rgba(0,0,0,.32),inset 0 0 24px rgba(0,0,0,.35);
}
.town-road{
  display:none;position:absolute;background:
    repeating-linear-gradient(90deg,rgba(38,26,16,.5) 0 3px,transparent 3px 13px),
    repeating-linear-gradient(0deg,#755a34 0 9px,#594128 9px 18px);
  border:2px solid rgba(35,24,12,.62);opacity:.9;z-index:1;
  box-shadow:inset 0 2px 0 rgba(255,255,255,.08),0 2px 0 rgba(0,0,0,.32);
}
.town-road-main{left:-24px;top:120px;width:430px;height:34px;transform:rotate(-11deg)}
.town-road-branch{left:150px;top:42px;width:34px;height:206px;transform:rotate(4deg)}
.town-palisade{
  display:none;position:absolute;left:10px;right:10px;top:151px;height:22px;z-index:3;pointer-events:none;
  border-top:2px solid rgba(29,18,12,.75);border-bottom:2px solid rgba(29,18,12,.55);
}
.town-palisade i{
  position:absolute;top:-5px;width:9px;height:30px;background:#6b4424;border:2px solid #28170f;
  box-shadow:inset 2px 0 0 rgba(255,255,255,.08),0 2px 0 rgba(0,0,0,.38);
}
.town-palisade i:nth-child(1){left:8%}
.town-palisade i:nth-child(2){left:23%}
.town-palisade i:nth-child(3){left:38%}
.town-palisade i:nth-child(4){left:57%}
.town-palisade i:nth-child(5){left:74%}
.town-palisade i:nth-child(6){left:89%}
.town-gate{
  display:none;position:absolute;left:50%;top:143px;width:42px;height:31px;transform:translateX(-50%);z-index:4;
  background:repeating-linear-gradient(90deg,#6e4728 0 7px,#4b301d 7px 11px);
  border:2px solid #21140d;box-shadow:inset 0 3px 0 rgba(255,255,255,.08),0 3px 0 rgba(0,0,0,.35);
}
.town-woods,.town-stones,.town-fields{display:none;position:absolute;z-index:2;pointer-events:none}
.town-woods{left:4%;top:8%;width:102px;height:88px}
.town-woods i{
  position:absolute;width:19px;height:24px;background:#2f6d3e;border:2px solid #15351f;
  box-shadow:inset 2px 2px 0 rgba(255,255,255,.1),0 2px 0 rgba(0,0,0,.38);
}
.town-woods i:after{
  content:"";position:absolute;left:4px;bottom:-8px;width:5px;height:8px;background:#6b4424;border-left:1px solid #2a170d;
}
.town-woods i:nth-child(1){left:5px;top:12px}
.town-woods i:nth-child(2){left:28px;top:2px}
.town-woods i:nth-child(3){left:53px;top:16px}
.town-woods i:nth-child(4){left:18px;top:44px}
.town-woods i:nth-child(5){left:68px;top:45px}
.town-stones{right:5%;top:10%;width:88px;height:62px}
.town-stones i{
  position:absolute;width:22px;height:15px;background:#77808f;border:2px solid #343a48;
  box-shadow:inset 2px 2px 0 rgba(255,255,255,.15),0 2px 0 rgba(0,0,0,.4);
}
.town-stones i:nth-child(1){left:6px;top:19px}
.town-stones i:nth-child(2){left:30px;top:7px}
.town-stones i:nth-child(3){left:54px;top:24px}
.town-stones i:nth-child(4){left:27px;top:39px}
.town-fields{
  right:4%;top:78px;width:118px;height:58px;display:grid;grid-template-columns:repeat(3,1fr);gap:4px;
  transform:skewY(-6deg);
}
.town-fields i{
  border:2px solid #61441e;background:repeating-linear-gradient(90deg,#8c7b31 0 5px,#526d2f 5px 10px);
  box-shadow:inset 1px 1px 0 rgba(255,255,255,.08);
}
.town-building{
  position:absolute;z-index:5;min-width:62px;text-align:center;font-size:10px;line-height:1.15;text-shadow:1px 1px 0 #000;
}
.town-building-sprite{
  position:relative;display:block;margin:0 auto 2px;width:72px;height:64px;border:0;background:none;box-shadow:none;
  filter:drop-shadow(0 5px 0 rgba(0,0,0,.28));
}
.town-building-sprite:before,.town-building-sprite:after{content:none}
.map-pix{
  width:100%;height:100%;display:block;background-repeat:no-repeat;background-position:center;background-size:100% 100%;
  image-rendering:pixelated;
}
.town-map-badge{
  position:absolute;right:4px;bottom:4px;min-width:28px;padding:2px 4px;border:1px solid #59617b;background:rgba(8,10,18,.78);
  color:#f0d060;font-size:9px;line-height:1;box-shadow:0 2px 0 rgba(0,0,0,.35);
}
.town-level-badge{right:10px;bottom:5px;color:#dce9ff;border-color:#d6a83f}
.town-hall{left:50%;top:4%;transform:translate(-50%,-30%);min-width:92px}
.town-hall .town-building-sprite{width:102px;height:78px}
.town-lumber{left:8%;top:10%}
.town-lumber .town-building-sprite{width:76px;height:72px}
.town-quarry{right:7%;top:0%}
.town-quarry .town-building-sprite{width:74px;height:76px}
.town-farm{right:18%;top:20%}
.town-farm .town-building-sprite{width:82px;height:66px}
.town-tower{left:39%;top:45%;min-width:58px}
.town-tower .town-building-sprite{width:78px;height:66px}
.town-arrow-tower{right:8%;top:39%;min-width:58px}
.town-arrow-tower .town-building-sprite{width:78px;height:66px}
.town-worker-group{
  position:absolute;z-index:6;pointer-events:none;width:76px;height:42px;
}
.worker-wood-group{left:21%;top:27%}
.worker-stone-group{right:13%;top:13%}
.worker-food-group{right:30%;top:28%}
.town-worker{
  position:absolute;width:8px;height:10px;background:#d4b06a;border:1px solid #332414;
  box-shadow:0 2px 0 rgba(0,0,0,.35),inset 1px 1px 0 rgba(255,255,255,.16);
}
.town-worker:before{
  content:"";position:absolute;left:2px;top:-5px;width:4px;height:4px;background:#c9965a;border:1px solid #332414;
}
.town-worker:after{
  content:"";position:absolute;left:-2px;top:3px;width:12px;height:2px;background:#5d4530;
  box-shadow:0 5px 0 #2b2118;
}
/* === 伐木工 — 棕色衣 + 圆帽 + 斧头 === */
.worker-wood{background:#a0683a;width:9px;height:11px;border-color:#4a2a18;box-shadow:1px 2px 0 rgba(0,0,0,.3),inset 2px 1px 0 rgba(255,255,255,.08),-1px 4px 0 -2px #3a2210}
.worker-wood:before{left:1px;top:-6px;width:6px;height:5px;background:#c9956a;border-color:#4a2a18;border-radius:60% 60% 30% 30%;box-shadow:0 -2px 0 #4a2818}
.worker-wood:after{
  left:5px;top:-1px;width:3px;height:15px;background:#6b4025;box-shadow:4px -3px 0 #c5cbd3;transform-origin:1px 12px;
}
/* === 采石工 — 灰衣 + 圆盔 + 镐头(镰刀形改) === */
.worker-stone{background:#8992a3;width:7px;height:12px;border-color:#3a3f4a;box-shadow:1px 2px 0 rgba(0,0,0,.3),inset 1px 1px 0 rgba(255,255,255,.12),-2px 3px 0 -1px #545b70}
.worker-stone:before{left:0;top:-6px;width:7px;height:5px;background:#b6bcc4;border-color:#4a4f5a;border-radius:3px 3px 2px 2px;box-shadow:0 -2px 0 #545b70}
.worker-stone:after{
  left:-7px;top:4px;width:16px;height:2px;background:#4a4a4a;box-shadow:6px -4px 0 #6f7890,14px -4px 0 #545b70;transform-origin:8px 1px;
}
/* === 粮农 — 黄衣 + 宽草帽 + 镰刀 === */
.worker-food{background:#c4a040;width:7px;height:12px;border-color:#5a4520;box-shadow:1px 2px 0 rgba(0,0,0,.3),inset 2px 1px 0 rgba(255,255,255,.1),-2px 3px 0 -1px #8a6d28}
.worker-food:before{left:-1px;top:-7px;width:8px;height:5px;background:#e0c870;border-color:#6a5530;border-radius:70% 70% 15% 15%;box-shadow:0 -1px 0 #b09840,-2px 1px 0 #a08030}
.worker-food:after{
  left:-6px;top:6px;width:18px;height:2px;background:#7b5a30;box-shadow:8px -4px 0 #d6a83f;transform-origin:10px 1px;
}
.worker-wood-1{left:2px;top:8px}
.worker-wood-2{left:22px;top:22px;animation-delay:.35s}
.worker-wood-3{left:45px;top:12px;animation-delay:.7s}
.worker-stone-1{left:3px;top:15px}
.worker-stone-2{left:27px;top:3px;animation-delay:.25s}
.worker-stone-3{left:51px;top:21px;animation-delay:.55s}
.worker-food-1{left:2px;top:20px}
.worker-food-2{left:28px;top:8px;animation-delay:.45s}
.worker-food-3{left:52px;top:24px;animation-delay:.9s}
.worker-chop{animation:townWorkerChop 3.2s linear infinite}
.worker-mine{animation:townWorkerMine 3.2s linear infinite}
.worker-harvest{animation:townWorkerHarvest 3.8s linear infinite}
.worker-step{animation:townWorkerStep 3.8s linear infinite}
.worker-chop:after{animation:townToolChop .6s ease-in-out infinite}
.worker-mine:after{animation:townToolMine .5s ease-in-out infinite}
.worker-harvest:after{animation:townToolHarvest .55s ease-in-out infinite}
@keyframes townWorkerChop{
  0%{transform:translate(0,0) scaleX(1)}
  15%{transform:translate(14px,0) scaleX(1)}
  /* 抡斧砍树：身体起伏 */
  18%{transform:translate(13px,-4px) scaleX(1)}
  22%{transform:translate(15px,1px) scaleX(1)}
  26%{transform:translate(13px,-3px) scaleX(1)}
  30%{transform:translate(15px,0) scaleX(1)}
  34%{transform:translate(14px,-2px) scaleX(1)}
  38%{transform:translate(14px,1px) scaleX(1)}
  44%{transform:translate(14px,0) scaleX(1)}
  52%{transform:translate(14px,0) scaleX(1)}
  /* 转身走回 */
  56%{transform:translate(14px,0) scaleX(-1)}
  72%{transform:translate(0,0) scaleX(-1)}
  76%{transform:translate(0,0) scaleX(1)}
  100%{transform:translate(0,0) scaleX(1)}
}
@keyframes townWorkerMine{
  0%{transform:translate(0,0) scaleX(1)}
  15%{transform:translate(18px,0) scaleX(1)}
  /* 挥镐凿石：横向抡摆 */
  18%{transform:translate(14px,-2px) scaleX(1)}
  22%{transform:translate(22px,1px) scaleX(1)}
  26%{transform:translate(15px,-1px) scaleX(1)}
  30%{transform:translate(20px,2px) scaleX(1)}
  34%{transform:translate(16px,-2px) scaleX(1)}
  38%{transform:translate(21px,0) scaleX(1)}
  44%{transform:translate(18px,0) scaleX(1)}
  52%{transform:translate(18px,0) scaleX(1)}
  56%{transform:translate(18px,0) scaleX(-1)}
  72%{transform:translate(0,0) scaleX(-1)}
  76%{transform:translate(0,0) scaleX(1)}
  100%{transform:translate(0,0) scaleX(1)}
}
@keyframes townWorkerHarvest{
  0%{transform:translate(0,0) scaleX(1)}
  15%{transform:translate(20px,0) scaleX(1)}
  /* 弯腰割麦：身体下沉 + 左右横扫 */
  18%{transform:translate(16px,5px) scaleX(1)}
  22%{transform:translate(24px,4px) scaleX(1)}
  26%{transform:translate(17px,6px) scaleX(1)}
  30%{transform:translate(23px,5px) scaleX(1)}
  34%{transform:translate(18px,6px) scaleX(1)}
  38%{transform:translate(22px,4px) scaleX(1)}
  44%{transform:translate(20px,0) scaleX(1)}
  52%{transform:translate(20px,0) scaleX(1)}
  56%{transform:translate(20px,0) scaleX(-1)}
  72%{transform:translate(0,0) scaleX(-1)}
  76%{transform:translate(0,0) scaleX(1)}
  100%{transform:translate(0,0) scaleX(1)}
}
@keyframes townWorkerStep{
  0%{transform:translate(0,0) scaleX(1)}
  15%{transform:translate(-10px,1px) scaleX(1)}
  /* 弯腰堆放 */
  18%{transform:translate(-9px,4px) scaleX(1)}
  22%{transform:translate(-11px,3px) scaleX(1)}
  26%{transform:translate(-9px,5px) scaleX(1)}
  30%{transform:translate(-10px,3px) scaleX(1)}
  34%{transform:translate(-11px,4px) scaleX(1)}
  40%{transform:translate(-10px,1px) scaleX(1)}
  52%{transform:translate(-10px,1px) scaleX(1)}
  56%{transform:translate(-10px,1px) scaleX(-1)}
  72%{transform:translate(0,0) scaleX(-1)}
  76%{transform:translate(0,0) scaleX(1)}
  100%{transform:translate(0,0) scaleX(1)}
}
@keyframes townToolChop{
  0%{transform:rotate(-35deg)}
  50%{transform:rotate(30deg)}
  100%{transform:rotate(-35deg)}
}
@keyframes townToolMine{
  0%{transform:rotate(10deg)}
  50%{transform:rotate(-25deg)}
  100%{transform:rotate(10deg)}
}
@keyframes townToolHarvest{
  0%{transform:rotate(5deg)}
  50%{transform:rotate(-20deg)}
  100%{transform:rotate(5deg)}
}
.town-guard{
  position:absolute;z-index:6;pointer-events:none;
  width:42px;height:42px;
}
.town-guard .pix-icon{
  width:100%;height:100%;display:block;
  image-rendering:pixelated;
}
/* 骑兵横向更宽 */
.guard-cavalry{width:58px;height:52px}
/* 位置 — 围栏外前线 */
.guard-infantry{left:45%;top:56%}
.guard-archer{left:13%;top:57%}
.guard-cavalry{left:28%;top:64%}
.guard-spearman{right:14%;top:57%}
.guard-mage{left:58%;top:54%}
/* 动画 */
.guard-patrol{animation:townGuardPatrol 4.4s linear infinite}
.guard-watch{animation:townGuardWatch 3.4s ease-in-out infinite}
.guard-ride{animation:townGuardRide 5.4s linear infinite}
.guard-stand{animation:townGuardStand 2.4s ease-in-out infinite}
.guard-pulse{animation:townGuardPulse 2.2s ease-in-out infinite}
@keyframes townGuardPatrol{
  0%{transform:translate(0,0) scaleX(-1)}
  45%{transform:translate(26px,0) scaleX(-1)}
  50%{transform:translate(26px,0) scaleX(1)}
  95%{transform:translate(0,0) scaleX(1)}
  100%{transform:translate(0,0) scaleX(-1)}
}
@keyframes townGuardWatch{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-3px)}
}
@keyframes townGuardRide{
  0%{transform:translate(0,0) scaleX(-1)}
  45%{transform:translate(80px,-6px) scaleX(-1)}
  50%{transform:translate(80px,-6px) scaleX(1)}
  95%{transform:translate(0,0) scaleX(1)}
  100%{transform:translate(0,0) scaleX(-1)}
}
@keyframes townGuardStand{
  0%,100%{transform:scaleY(1)}
  50%{transform:scaleY(.92)}
}
@keyframes townGuardPulse{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-3px)}
}
.town-invasion-layer,.town-vfx-layer{
  position:absolute;inset:0;pointer-events:none;
}
.town-invasion-layer{z-index:12}
.town-vfx-layer{z-index:20;overflow:hidden}
.town-phase-banner{
  position:absolute;left:50%;top:8px;z-index:32;transform:translateX(-50%);
  padding:4px 8px;border:2px solid #d6a83f;background:rgba(12,12,20,.88);
  color:#f0d060;font-size:10px;line-height:1;text-shadow:1px 1px 0 #000;
  box-shadow:inset 1px 1px 0 rgba(255,255,255,.08),0 2px 0 #05060b;
}
.town-map.is-warning{
  animation:townWarningPulse .9s ease-in-out infinite;
}
.town-map.is-warning .town-frontier-zone,.town-map.is-battle .town-frontier-zone,.town-map.is-result .town-frontier-zone{
  display:block;
}
/* 出击动画 — 每个兵种独立偏移，向右侧敌人方向移动但不出界 */
.town-map.is-sortie .guard-archer{animation:townGuardSortieArcher 1.25s ease-out forwards}
.town-map.is-sortie .guard-cavalry{animation:townGuardSortieCavalry 1.25s ease-out forwards}
.town-map.is-sortie .guard-infantry{animation:townGuardSortieInfantry 1.25s ease-out forwards}
.town-map.is-sortie .guard-mage{animation:townGuardSortieMage 1.25s ease-out forwards}
.town-map.is-sortie .guard-spearman{animation:townGuardSortieSpearman 1.25s ease-out forwards}
/* 交战状态 — 每个兵种停在对应位置，不再统一偏移 */
.town-map.is-battle .town-guard{animation:none!important}
.town-map.is-battle .guard-archer{transform:translate(70px,3px) scaleX(-1)}
.town-map.is-battle .guard-cavalry{transform:translate(45px,-4px) scaleX(-1)}
.town-map.is-battle .guard-infantry{transform:translate(25px,4px) scaleX(-1)}
.town-map.is-battle .guard-mage{transform:translate(8px,6px) scaleX(-1)}
.town-map.is-battle .guard-spearman{transform:translate(-15px,3px) scaleX(-1)}
.town-invader{
  position:absolute;right:8%;top:62%;width:42px;height:42px;opacity:1;
  filter:drop-shadow(0 3px 0 rgba(0,0,0,.45));
}
.town-invader .pix-icon{width:100%;height:100%;display:block}
.town-invader.invader-1{top:56%;animation-delay:.05s}
.town-invader.invader-2{top:65%;animation-delay:.22s}
.town-invader.invader-3{top:60%;animation-delay:.38s}
.town-map.is-spawn .town-invader{
  right:-58px;opacity:0;animation:townInvaderEnter 1.1s ease-out forwards;
}
.town-map.is-battle .town-invader{
  animation:townInvaderBattle .72s ease-in-out infinite;
}
.town-map.is-result.result-win .town-invader{
  animation:townInvaderDefeat .8s ease forwards;
}
.town-map.is-result.result-lose .town-guard{
  filter:grayscale(.6) brightness(.8);
}
.town-skirmish-flash{
  position:absolute;left:41%;top:55%;width:116px;height:60px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,224,120,.46),rgba(224,96,96,.18) 48%,transparent 70%);
  animation:townSkirmishFlash .42s ease-in-out infinite;
}
.town-demo-vfx{
  opacity:0;transform:translate(-50%,-50%) rotate(-8deg);
  animation:townDemoVfx .78s ease-in-out infinite;
}
.town-demo-vfx:nth-child(2){animation-delay:.18s}
.town-demo-vfx:nth-child(3){animation-delay:.34s}
.town-cooldown-bar{
  display:none;position:absolute;left:28px;right:28px;bottom:8px;z-index:31;height:5px;
  border:1px solid #59617b;background:rgba(8,10,18,.82);box-shadow:0 2px 0 rgba(0,0,0,.35);
}
.town-map.is-cooldown .town-cooldown-bar{display:block}
.town-cooldown-bar i{
  display:block;height:100%;background:repeating-linear-gradient(90deg,#4f9b67 0 6px,#78d18e 6px 9px);
}
@keyframes townWarningPulse{
  0%,100%{box-shadow:inset 0 0 0 3px #090d13,inset 2px 2px 0 rgba(255,255,255,.07),inset -2px -2px 0 rgba(0,0,0,.55),0 2px 0 #05060b}
  50%{box-shadow:inset 0 0 0 3px #5a1d1d,inset 0 0 28px rgba(224,72,72,.5),0 2px 0 #05060b}
}
@keyframes townInvaderEnter{
  from{right:-58px;opacity:0}
  to{right:8%;opacity:1}
}
@keyframes townInvaderBattle{
  0%,100%{right:8%;transform:translateY(0) scaleX(-1)}
  50%{right:14%;transform:translateY(-3px) scaleX(-1)}
}
@keyframes townInvaderDefeat{
  0%{right:8%;opacity:1;filter:grayscale(0)}
  100%{right:4%;opacity:0;filter:grayscale(1);transform:translateY(8px) scale(.75)}
}
@keyframes townGuardSortieArcher{
  0%{transform:translate(0,0) scaleX(-1)}
  100%{transform:translate(70px,3px) scaleX(-1)}
}
@keyframes townGuardSortieCavalry{
  0%{transform:translate(0,0) scaleX(-1)}
  100%{transform:translate(45px,-4px) scaleX(-1)}
}
@keyframes townGuardSortieInfantry{
  0%{transform:translate(0,0) scaleX(-1)}
  100%{transform:translate(25px,4px) scaleX(-1)}
}
@keyframes townGuardSortieMage{
  0%{transform:translate(0,0) scaleX(-1)}
  100%{transform:translate(8px,6px) scaleX(-1)}
}
@keyframes townGuardSortieSpearman{
  0%{transform:translate(0,0) scaleX(-1)}
  100%{transform:translate(-15px,3px) scaleX(-1)}
}
@keyframes townSkirmishFlash{
  0%,100%{opacity:.25;transform:scale(.82)}
  50%{opacity:.9;transform:scale(1.08)}
}
@keyframes townDemoVfx{
  0%{opacity:0;transform:translate(-50%,-50%) rotate(-10deg) scale(.72)}
  35%{opacity:1;transform:translate(-10%,-50%) rotate(-10deg) scale(1.05)}
  100%{opacity:0;transform:translate(32%,-50%) rotate(-10deg) scale(.92)}
}
.town-troop-summary{
  margin-top:8px;padding:6px 7px;border:2px solid #2b3144;background:#0d101b;color:#c5cad8;
  font-size:10px;line-height:1.45;word-break:break-all;text-shadow:1px 1px 0 #000;
}
@media (prefers-reduced-motion: reduce){
  .town-worker,.town-worker:after,.town-guard,.town-map.is-warning,.town-invader,.town-demo-vfx,.town-skirmish-flash{animation:none!important}
}

/* ===== 像素风皮肤（CSS变量 + 暗色主题）===== */
:root{
  --px-bg:#080912;
  --px-panel:#151724;
  --px-panel-2:#1c2030;
  --px-line:#3a4158;
  --px-line-dark:#05060b;
  --px-gold:#d6a83f;
  --px-gold-soft:#f0d060;
  --px-red:#b34a4a;
  --px-blue:#4f78b7;
  --px-green:#4f9b67;
  --px-muted:#8890a6;
}
*{image-rendering:pixelated}
body{
  background-color:var(--px-bg);
  background-image:
    linear-gradient(45deg,rgba(214,168,63,.05) 25%,transparent 25%),
    linear-gradient(-45deg,rgba(79,120,183,.04) 25%,transparent 25%),
    linear-gradient(#111421 1px,transparent 1px);
  background-size:8px 8px,8px 8px,4px 4px;
}
#phone{
  background:linear-gradient(180deg,#0f111d,#090a12);
  border:3px solid var(--px-line);
  border-radius:0;
  box-shadow:0 0 0 3px var(--px-line-dark),0 12px 0 rgba(0,0,0,.38);
}
#topbar,#navbar,#battle-top{
  background:#090a12;
  border-color:#30364a;
  box-shadow:inset 0 -2px 0 #05060b;
}
#main{background:linear-gradient(180deg,#101220,#0b0d17)}
.pix-icon{
  width:24px;height:24px;display:inline-block;vertical-align:-6px;flex:0 0 auto;
  background-repeat:no-repeat;background-position:center;background-size:100% 100%;
  image-rendering:pixelated;
}
.pix-icon.mini{width:14px;height:14px;vertical-align:-2px}
.pix-icon.sm{width:18px;height:18px;vertical-align:-4px}
.pix-icon.lg{width:32px;height:32px;vertical-align:-9px}
.pix-icon.nav-pix{width:22px;height:22px;display:block;margin:0 auto 2px}
.pix-icon.top-pix{width:22px;height:22px;display:block;margin:0 auto 1px}
.pix-icon.card-pix{margin-right:5px}
.card,.modal-box,.unit-box,.form-slot,.modal-unit,.btn,.btn-speed,.toast{
  border-radius:0!important;
  box-shadow:inset 2px 2px 0 rgba(255,255,255,.06),inset -2px -2px 0 rgba(0,0,0,.45),0 2px 0 #05060b;
}
.card{
  background:linear-gradient(180deg,var(--px-panel-2),var(--px-panel));
  border:2px solid var(--px-line);
  border-left-color:#5a5f77;
  border-top-color:#606783;
  padding:10px 12px;
}
.card h3{
  display:flex;align-items:center;gap:5px;
  color:#e7dfc4;text-shadow:1px 1px 0 #000;
  font-size:13px;letter-spacing:0;
}
.btn,.btn-speed{
  display:inline-flex;align-items:center;justify-content:center;gap:5px;
  min-height:28px;border:2px solid #4b4f62;background:#171a27;color:#d4d8e8;
  text-shadow:1px 1px 0 #000;white-space:nowrap;
}
.btn-go,.btn-speed.on{
  background:#d6a83f;color:#15110a;border-color:#f0d060;
  box-shadow:inset 2px 2px 0 rgba(255,255,255,.28),inset -2px -2px 0 rgba(82,48,8,.45),0 2px 0 #5f3e11;
  text-shadow:none;
}
.btn-ghost{background:#111422;border-color:#3b4158;color:#c5cad8}
.btn-danger{background:#8d2e34;border-color:#d45b62;color:#fff}
.top-res .val{color:var(--px-gold-soft);text-shadow:1px 1px 0 #000}
.top-res .label,.nav-btn{font-size:10px;text-shadow:1px 1px 0 #000}
.nav-btn{padding:7px 2px;color:#777f96}
.nav-btn.on{background:#121522;color:var(--px-gold-soft);box-shadow:inset 0 2px 0 #2b3144}
.nav-btn.on .nicon{text-shadow:none}
.unit-row,.modal-unit{border-bottom:2px solid #111421}
.unit-row .uicon{width:34px}
.form-row{
  background:#111421;border:2px solid #2b3144;border-left-width:4px;border-radius:0;
  box-shadow:inset 2px 2px 0 rgba(255,255,255,.04);
}
.form-row.r1{border-color:#2b3144;border-left-color:var(--px-red)}
.form-row.r2{border-color:#2b3144;border-left-color:var(--px-gold)}
.form-row.r3{border-color:#2b3144;border-left-color:var(--px-blue)}
.form-slot{
  background:#171a27;border:2px dashed #3a4158;min-width:72px;
}
.form-slot.filled{background:#202538;border:2px solid #59617b}
.modal-overlay{background:rgba(0,0,0,.78)}
.modal-box{background:#121522;border:3px solid #59617b}
.modal-unit{background:#171a27;border:2px solid #2d3449}
.modal-unit:hover,.modal-unit.sel{border-color:var(--px-gold-soft);background:#242434}
.modal-qty input{
  border-radius:0;background:#080912;border:2px solid #3a4158;color:var(--px-gold-soft);
}
.modal-qty button,.qty-ctrl button{
  border-radius:0!important;border:2px solid #4b4f62;background:#151827;
}
.prog-wrap{border-radius:0;border:1px solid #080912;background:#05060b}
.prog-fill{background:repeating-linear-gradient(90deg,#b47b2a 0 5px,#f0d060 5px 8px)}
#battle-screen{background:#080912}
.enemy-zone,.our-zone{
  border-radius:0;border-width:2px;border-style:solid;background:#0e101b;
  box-shadow:inset 2px 2px 0 rgba(255,255,255,.03),inset -2px -2px 0 rgba(0,0,0,.35);
}
.enemy-zone{border-color:#8f3c46}
.our-zone{border-color:#395f99}
.zone-label{display:flex;align-items:center;justify-content:center;gap:5px;color:#aab1c4}
.unit-box{
  width:68px;min-height:76px;background:#151827;border:3px solid #353b52;
  padding:4px 3px;color:#d9deeb;
}
.unit-box .ub-icon{font-size:0;line-height:1}
.unit-box .ub-icon .pix-icon.lg{width:42px;height:42px;vertical-align:0}
.unit-box .ub-name{font-size:9px;color:#bbc1d4;line-height:1.2;margin-top:2px}
.unit-box .ub-hp{
  min-width:30px;margin-top:2px;padding:1px 4px;background:#080912;border:1px solid #31384e;
  font-size:10px;color:var(--px-gold-soft);
}
.unit-box.targeted{border-color:var(--px-gold-soft)!important;box-shadow:0 0 0 2px #6e4b1b,inset 2px 2px 0 rgba(255,255,255,.08)}
@keyframes strike{0%,100%{transform:translateY(0);box-shadow:0 0 8px rgba(255,255,200,.6)}30%{transform:translateY(-6px);box-shadow:0 0 18px rgba(255,255,150,.9)}60%{transform:translateY(3px);box-shadow:0 0 14px rgba(255,255,200,.7)}}
@keyframes shaken{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px);border-color:#ff4444}40%{transform:translateX(5px)}60%{transform:translateX(-3px);border-color:#ff0000}80%{transform:translateX(3px)}}
@keyframes die{0%{opacity:1;filter:grayscale(0)}50%{opacity:.6;filter:grayscale(1);transform:translateY(2px)}100%{opacity:0;filter:grayscale(1);transform:scale(.4)}}
#battle-field{position:relative}
#battle-vfx-layer{position:absolute;inset:0;pointer-events:none;z-index:50;overflow:visible}
.vfx{position:absolute;pointer-events:none;z-index:999;transform-origin:center center}
.vfx-slash{width:28px;height:28px;border-radius:50%;border:5px solid transparent;border-top-color:#ffe566;border-right-color:#ffb800;box-shadow:0 0 16px rgba(255,215,0,1),0 0 35px rgba(255,180,0,.7),0 0 55px rgba(255,120,0,.4)}
.vfx-slash::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;border:3px solid transparent;border-top-color:#fff9c0;border-right-color:#ffd700;box-shadow:0 0 10px rgba(255,255,200,1)}
.vfx-swordqi,.vfx-arrow,.vfx-thrust,.vfx-cavslash,.vfx-magebolt{background-position:center;background-repeat:no-repeat;background-size:contain;image-rendering:pixelated;will-change:transform,opacity,filter}
.vfx-swordqi{background-image:url('./assets/vfx-infantry-swordqi.png');filter:brightness(1.25) drop-shadow(0 0 10px rgba(195,225,255,.9))}
.vfx-arrow{background-image:url('./assets/vfx-archer-arrow.png');filter:brightness(1.15) drop-shadow(0 0 10px rgba(255,195,80,.75))}
.vfx-thrust{background-image:url('./assets/vfx-spearman-thrust.png');filter:brightness(1.12) drop-shadow(0 0 12px rgba(255,205,95,.8))}
.vfx-cavslash{background-image:url('./assets/vfx-cavalry-slash.png');filter:brightness(1.22) drop-shadow(0 0 14px rgba(115,185,255,.8))}
.vfx-magebolt{background-image:url('./assets/vfx-mage-bolt.png');filter:brightness(1.18) drop-shadow(0 0 14px rgba(135,110,255,.85))}
.dummy-zone{border-color:#6b5a3e!important;background:#12100a!important}
.dummy-box{border-color:#5a4a30!important;background:#1a150a!important}
.dummy-box .ub-name{color:#c0a860!important}
.dummy-box .ub-hp{color:#e0c870!important;border-color:#5a4a30!important}
.dummy-dmg{font-size:8px;color:#c08060;text-align:center;margin-top:1px;line-height:1.1}
#training-result{padding:12px;text-align:center;display:none;flex-direction:column;gap:6px;background:#12100a;border-top:3px solid #6b5a3e}
.training-stat-row{display:flex;align-items:center;gap:6px;padding:4px 8px;background:#0e0c08;border:1px solid #2b2418;border-radius:4px;font-size:10px;text-align:left}
.training-stat-row .ts-icon{flex-shrink:0}
.training-stat-row .ts-info{flex:1;min-width:0}
.training-stat-row .ts-name{font-size:11px;color:#e0c870;font-weight:bold}
.training-stat-row .ts-num{color:#888;line-height:1.5}
#battle-result{background:#121522;border-width:3px}
#battle-msg{background:#080912;border-top:2px solid #242b3f}
#battle-title{flex:1;min-width:0;font-size:13px;line-height:1.35}
#battle-speed{flex-shrink:0}
#battle-top .btn-sm{padding:4px 7px}
@media (max-width:360px){
  body{font-size:13px}
  #topbar{padding:6px 4px}
  .pix-icon.top-pix{width:18px;height:18px}
  .top-res .val{font-size:12px}
  .top-res .label,.nav-btn{font-size:9px}
  .card{padding:8px}
  .btn{padding:6px 9px}
  .btn-xs{padding:2px 6px}
  .unit-row{gap:6px}
  .unit-row .uinfo{min-width:96px}
  .train-custom input{width:46px}
  .form-slot{min-width:62px;min-height:82px}
  .form-slot .pix-icon.sm{width:38px;height:38px}
  .modal-unit .mu-icon{width:54px;height:54px}
  .modal-unit .mu-icon .pix-icon.lg{width:50px;height:50px}
  .unit-box{width:60px;min-height:72px}
  .unit-box .ub-icon .pix-icon.lg{width:38px;height:38px}
}
@media (min-height:920px){
  #phone{max-height:100dvh}
}
</style>
</head>
<body>

<!-- ==================== HTML 骨架 ==================== -->
<!-- 手机框体 → 顶栏(资源) → 城镇场景 → 主内容区 → 底部导航 → 弹窗 → 战斗画面 -->
<div id="phone">
  <!-- 顶部资源栏：木材/石料/食物/人口 -->
  <div id="topbar">
    <div class="top-res"><span class="pix-icon i-wood top-pix"></span><div class="val" id="res-wood">0</div><span class="cap" id="cap-wood"></span><div class="label">木材</div></div>
    <div class="top-res"><span class="pix-icon i-stone top-pix"></span><div class="val" id="res-stone">0</div><span class="cap" id="cap-stone"></span><div class="label">石料</div></div>
    <div class="top-res"><span class="pix-icon i-food top-pix"></span><div class="val" id="res-food">0</div><span class="cap" id="cap-food"></span><div class="label">食物</div></div>
    <div class="top-res"><span class="pix-icon i-pop top-pix"></span><div class="val" id="res-pop">0</div><span class="cap" id="cap-pop"></span><div class="label">人口</div></div>
  </div>

  <!-- 城镇巡防地图（仅主页显示）-->
  <div id="town-scene"></div>
  <!-- 主内容区：由 ui.js 动态渲染标签页 -->
  <div id="main"></div>

  <!-- 底部导航栏：主页/建筑/军营/战斗/日志 -->
  <div id="navbar">
    <button class="nav-btn on" data-page="home"><span class="nicon pix-icon i-home nav-pix"></span>主页</button>
    <button class="nav-btn" data-page="build"><span class="nicon pix-icon i-build nav-pix"></span>建筑</button>
    <button class="nav-btn" data-page="barracks"><span class="nicon pix-icon i-army nav-pix"></span>军营</button>
    <button class="nav-btn" data-page="fight"><span class="nicon pix-icon i-battle nav-pix"></span>战斗</button>
    <button class="nav-btn" data-page="log"><span class="nicon pix-icon i-log nav-pix"></span>日志</button>
  </div>

  <!-- 编队弹窗（选择兵种+人数）-->
  <div class="modal-overlay" id="form-modal">
    <div class="modal-box" id="form-modal-content"></div>
  </div>

  <!-- 单位详情弹窗（属性面板）-->
  <div class="modal-overlay" id="unit-detail-modal">
    <div class="modal-box" id="unit-detail-content"></div>
  </div>

  <!-- 战斗画面（全屏覆盖）-->
  <div id="battle-screen">
    <div id="battle-top">
      <div id="battle-title"><span class="pix-icon i-battle sm"></span> 战斗</div>
      <div id="battle-speed">
        <button class="btn-speed on" data-spd="1">1x</button>
        <button class="btn-speed" data-spd="2">2x</button>
        <button class="btn-speed" data-spd="4">4x</button>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="fleeBattle()">逃跑</button>
    </div>
    <div id="battle-field"></div>
    <div id="battle-vfx-layer"></div>
    <div id="battle-result"></div>
    <div id="battle-msg"></div>
  </div>
</div>

<script src="config.js"></script>

<script src="levels.js"></script>
<script src="sprites.js"></script>
<script src="math.js"></script>
<script src="garrison.js"></script>
<script src="ui.js"></script>
</body>
</html>
